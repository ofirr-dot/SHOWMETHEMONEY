<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ניהול נתונים – Show Me The Money</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root {
      --card-bg: #fff;
      --page-bg: #f5f7fb;
      --text: #222;
    }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--page-bg); color:var(--text); direction:rtl; }
    .top-nav { display:flex; gap:12px; padding:12px; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.06); align-items:center; }
    .nav-item { text-decoration:none; color:var(--text); padding:6px 10px; border-radius:6px; }
    .nav-item.active { background:#007AFF; color:#fff; }
    .page { max-width:1100px; margin:20px auto; padding:16px; }
    .page-header h1 { margin:0 0 6px 0; }
    .page-subtitle { color:#666; margin-bottom:12px; }

    .card-list { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:16px; margin-top:12px; }
    .admin-card { background:var(--card-bg); padding:16px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); display:flex; flex-direction:column; gap:8px; }
    .admin-card-title { font-weight:700; font-size:16px; }
    .admin-card-field { color:#444; font-size:14px; }
    .edit-btn { margin-top:8px; padding:10px; background:#007AFF; color:white; border:none; border-radius:8px; cursor:pointer; font-size:14px; }
    .edit-btn:hover { background:#0063d6; }

    /* modal */
    .modal-overlay { position:fixed; inset:0; display:none; justify-content:center; align-items:center; background:rgba(0,0,0,0.45); z-index:999; }
    .modal { background:#fff; width:380px; padding:20px; border-radius:12px; box-shadow:0 6px 30px rgba(0,0,0,0.25); position:relative; }
    .modal h2 { margin:0 0 12px 0; font-size:18px; }
    .modal input { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; font-size:14px; }
    .modal-save { width:100%; padding:12px; background:#007AFF; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:15px; }
    .modal-close { position:absolute; top:10px; right:12px; cursor:pointer; font-size:18px; color:#666; }
    .hidden { display:none !important; }
    .debug-block { font-family:monospace; white-space:pre-wrap; background:#fff3; padding:8px; border-radius:8px; font-size:12px; color:#333; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="index.html" class="nav-item">סקירה כללית</a>
    <a href="admin.html" class="nav-item active">ניהול נתונים</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>⚙️ דף ניהול נתונים</h1>
      <div class="page-subtitle">עריכת נתונים ישירות באתר</div>
    </div>

    <h2>קרן השתלמות</h2>
    <div id="hishtalmut-cards" class="card-list"></div>

    <h2>בנקים</h2>
    <div id="banks-cards" class="card-list"></div>

    <h2>חיסכון לכל ילד</h2>
    <div id="kids-cards" class="card-list"></div>

    <!-- אופציונלי: בלוק דיבאג מוסתר (ניתן להפעיל זמנית) -->
    <div id="debug-output" class="debug-block hidden"></div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-close" onclick="closeModal()">✕</div>
      <h2 id="modal-title"></h2>
      <div id="modal-fields"></div>
      <button class="modal-save" onclick="saveModal()">שמור</button>
    </div>
  </div>

  <script>
    // כתובת ה‑API שלך (החלף אם קיבלת URL חדש אחרי Deploy)
    const API_URL = "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    let currentEdit = null;

    // טען נתונים מהשרת
    async function loadData() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // אם השרת מחזיר שדה debug — מתעלמים ממנו (לא מציגים)
        // סינון בנקים: לא להציג שורות מסוג "הוראה" או שורות שבהן הערות מכילות "הוראה"
        const banksRaw = Array.isArray(data.banks) ? data.banks : [];
        const banksFiltered = banksRaw.filter(b => {
          const type = (b.type || "").toString().trim();
          const bank = (b.bank || "").toString().trim();
          const notes = (b.notes || "").toString().toLowerCase();
          if (!bank && !type) return false;
          if (type === "הוראה" || bank === "הוראה") return false;
          if (notes.indexOf("הוראה") !== -1) return false;
          // אם השורה היא "סה\"כ" או דומה — סנן
          if (bank.indexOf("סה") !== -1 && bank.indexOf("סה\"כ") !== -1) return false;
          return true;
        });

        renderHishtalmut(data, banksRaw);
        renderBanks(banksFiltered);
        renderKids(Array.isArray(data.kids) ? data.kids : []);

        // debug: אם תרצה לראות את ה‑debug, תבטל את השורה הבאה
        // showDebug(data.debug || null);

      } catch (err) {
        console.error("Load error:", err);
        alert("שגיאה בטעינת הנתונים. בדוק את ה‑Console.");
      }
    }

    // הצגת קרן השתלמות: מחפש שורה בשם "קרן השתלמות" בתוך הבנקים (כמו שהשרת מחזיר)
    function renderHishtalmut(apiData, banksRaw) {
      // אם השרת מחזיר שדה hishtalmut מלא — השתמש בו, אחרת חפש בבנקים
      let hisht = apiData.hishtalmut || { value: 0, profit: 0 };
      if ((!hisht || !hisht.value) && Array.isArray(banksRaw)) {
        const found = banksRaw.find(b => (b.bank || "").toString().trim() === "קרן השתלמות");
        if (found) {
          hisht = { value: found.valueIls || 0, profit: found.profit || 0 };
        }
      }

      const container = document.getElementById("hishtalmut-cards");
      container.innerHTML = `
        <div class="admin-card">
          <div class="admin-card-title">קרן השתלמות</div>
          <div class="admin-card-field">שווי: ₪${Number(hisht.value || 0)}</div>
          <div class="admin-card-field">רווח: ₪${Number(hisht.profit || 0)}</div>
          <button class="edit-btn" onclick='openModal("hishtalmut", ${JSON.stringify({ value: hisht.value || 0, profit: hisht.profit || 0 }).replace(/"/g,'&quot;')})'>ערוך</button>
        </div>
      `;
    }

    function renderBanks(banks) {
      const container = document.getElementById("banks-cards");
      if (!banks || banks.length === 0) {
        container.innerHTML = `<div style="color:#666">אין בנקים להצגה</div>`;
        return;
      }

      container.innerHTML = banks.map(b => `
        <div class="admin-card">
          <div class="admin-card-title">${escapeHtml(b.bank)}</div>
          <div class="admin-card-field">סוג: ${escapeHtml(b.type)}</div>
          <div class="admin-card-field">שווי: ₪${Number(b.valueIls || 0)}</div>
          <button class="edit-btn" onclick='openModal("bank", ${JSON.stringify(b).replace(/"/g,'&quot;')})'>ערוך</button>
        </div>
      `).join("");
    }

    function renderKids(kids) {
      const container = document.getElementById("kids-cards");
      if (!kids || kids.length === 0) {
        container.innerHTML = `<div style="color:#666">אין חיסכון לילדים להצגה</div>`;
        return;
      }

      container.innerHTML = kids.map(k => `
        <div class="admin-card">
          <div class="admin-card-title">${escapeHtml(k.childName || k.name || "")}</div>
          <div class="admin-card-field">שווי: ₪${Number(k.value || k.valueIls || 0)}</div>
          <div class="admin-card-field">הפקדות: ₪${Number(k.deposits || 0)}</div>
          <button class="edit-btn" onclick='openModal("kid", ${JSON.stringify(k).replace(/"/g,'&quot;')})'>ערוך</button>
        </div>
      `).join("");
    }

    // פותח מודל עריכה
    function openModal(type, data) {
      currentEdit = { type, data };
      document.getElementById("modal-title").innerText =
        type === "kid" ? "עריכת חיסכון לילד" :
        type === "bank" ? "עריכת בנק" :
        "עריכת קרן השתלמות";

      let fields = "";

      if (type === "hishtalmut") {
        fields += `<input id="f-value" value="${escapeHtml(data.value || 0)}" placeholder="שווי (₪)" type="number">`;
        fields += `<input id="f-profit" value="${escapeHtml(data.profit || 0)}" placeholder="רווח (₪)" type="number">`;
      }

      if (type === "bank") {
        fields += `<input id="f-bank" value="${escapeHtml(data.bank || '')}" placeholder="שם הבנק">`;
        fields += `<input id="f-type" value="${escapeHtml(data.type || '')}" placeholder="סוג חשבון">`;
        fields += `<input id="f-value" value="${escapeHtml(data.valueIls || 0)}" placeholder="שווי (₪)" type="number">`;
      }

      if (type === "kid") {
        fields += `<input id="f-name" value="${escapeHtml(data.childName || data.name || '')}" placeholder="שם הילד">`;
        fields += `<input id="f-value" value="${escapeHtml(data.value || data.valueIls || 0)}" placeholder="שווי (₪)" type="number">`;
        fields += `<input id="f-deposits" value="${escapeHtml(data.deposits || 0)}" placeholder="הפקדות (₪)" type="number">`;
      }

      document.getElementById("modal-fields").innerHTML = fields;
      document.getElementById("modal-overlay").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal-overlay").style.display = "none";
    }

    // שמירה: שולח POST לשרת; מציג שגיאות מהשרת אם יש
    async function saveModal() {
      if (!currentEdit) return alert("אין מה לשמור");

      const { type } = currentEdit;
      let payload = { action: "" };

      if (type === "hishtalmut") {
        payload = {
          action: "update_hishtalmut",
          value: document.getElementById("f-value").value,
          profit: document.getElementById("f-profit").value
        };
      } else if (type === "bank") {
        payload = {
          action: "update_bank",
          bank: document.getElementById("f-bank").value,
          type: document.getElementById("f-type").value,
          value: document.getElementById("f-value").value
        };
      } else if (type === "kid") {
        payload = {
          action: "update_kid",
          name: document.getElementById("f-name").value,
          value: document.getElementById("f-value").value,
          deposits: document.getElementById("f-deposits").value
        };
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const json = await res.json();

        if (!json.ok) {
          // אם השרת מחזיר debug — אל תציג אותו אוטומטית; הצג רק הודעת שגיאה קצרה
          console.error("Server error detail:", json.debug || json);
          alert("שגיאה בשמירה: " + (json.error || "לא ידוע") + ". בדוק את ה‑Console לפרטים.");
          return;
        }

        closeModal();
        await loadData();
        alert("עודכן בהצלחה");
      } catch (err) {
        console.error("Save error:", err);
        alert("שגיאה בתקשורת עם השרת. בדוק את ה‑Console.");
      }
    }

    // פונקציה עזר להצגת debug (מוסתרת כברירת מחדל)
    function showDebug(obj) {
      const el = document.getElementById("debug-output");
      if (!obj) { el.classList.add("hidden"); el.innerText = ""; return; }
      el.classList.remove("hidden");
      el.innerText = JSON.stringify(obj, null, 2);
    }

    // בריחה מתווים לפני הצגה ב‑HTML
    function escapeHtml(s) {
      if (s === null || s === undefined) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // התחלה
    loadData();
  </script>

</body>
</html>
