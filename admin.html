<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>ניהול נתונים – Show Me The Money</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{--card-bg:#fff;--page-bg:#f5f7fb;--text:#222}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--page-bg);color:var(--text);direction:rtl}
    .top-nav{display:flex;gap:12px;padding:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.06);align-items:center}
    .nav-item{ text-decoration:none;color:var(--text);padding:6px 10px;border-radius:6px }
    .nav-item.active{ background:#007AFF;color:#fff }
    .page{max-width:1100px;margin:20px auto;padding:16px}
    .page-header h1{margin:0 0 6px 0}
    .page-subtitle{color:#666;margin-bottom:12px}
    .card-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:12px}
    .admin-card{background:var(--card-bg);padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;flex-direction:column;gap:8px}
    .admin-card-title{font-weight:700;font-size:16px}
    .admin-card-field{color:#444;font-size:14px}
    .edit-btn{margin-top:8px;padding:10px;background:#007AFF;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px}
    .modal-overlay{position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.45);z-index:999}
    .modal{background:#fff;width:460px;padding:20px;border-radius:12px;box-shadow:0 6px 30px rgba(0,0,0,0.25);position:relative}
    .modal h2{margin:0 0 12px 0;font-size:18px}
    .modal label{display:block;margin:8px 0 4px 0;font-size:13px;color:#333}
    .modal input, .modal select{width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid #ddd;font-size:14px;box-sizing:border-box}
    .modal-save{width:100%;padding:12px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px}
    .modal-close{position:absolute;top:10px;right:12px;cursor:pointer;font-size:18px;color:#666}
    .hidden{display:none!important}
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="index.html" class="nav-item">סקירה כללית</a>
    <a href="admin.html" class="nav-item active">ניהול נתונים</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>⚙️ דף ניהול נתונים</h1>
      <div class="page-subtitle">עריכת נתונים ישירות באתר</div>
    </div>

    <h2>בנקים</h2>
    <div id="banks-cards" class="card-list"></div>

    <h2>חיסכון לכל ילד</h2>
    <div id="kids-cards" class="card-list"></div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-close" onclick="closeModal()">✕</div>
      <h2 id="modal-title"></h2>
      <div id="modal-fields"></div>
      <button class="modal-save" onclick="saveModal()">שמור</button>
    </div>
  </div>

  <script>
    // החלף ל-URL החדש אם קיבלת Deploy חדש
    const API_URL = "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    let currentEdit = null;

    function normalizeDisplay(s) {
      if (s === null || s === undefined) return "";
      return String(s).trim().replace(/\u00A0/g, " ").replace(/\s+/g, " ");
    }

    async function loadData() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const banksRaw = Array.isArray(data.banks) ? data.banks : [];
        const banksFiltered = banksRaw.filter(b => {
          const bank = b.bank || "";
          const type = b.type || "";
          const notes = b.notes || "";
          if (!bank && !type) return false;
          if (String(bank).indexOf("סה\"כ") !== -1 || String(bank).toLowerCase().indexOf("סהכ") !== -1) return false;
          if (String(type).trim() === "הוראה") return false;
          // הסרת בועות/הנחיות (אם יש)
          const bankLower = normalizeDisplay(bank).toLowerCase();
          const notesLower = normalizeDisplay(notes).toLowerCase();
          if (/^[1-5]\s*[.\-]/.test(bankLower) || /^[1-5]\s+/.test(bankLower)) return false;
          const instructionPhrases = ["הזן יתרת עדכנית","שווי בשקלים מחושב","חשבונות ils","לאחר עדכון","ניתן להוסיף שירותים","הוראה"];
          for (const p of instructionPhrases) {
            if (bankLower.indexOf(p) !== -1 || notesLower.indexOf(p) !== -1) return false;
          }
          return true;
        });

        renderBanks(banksFiltered);
        renderKids(Array.isArray(data.kids) ? data.kids : []);
      } catch (err) {
        console.error("Load error:", err);
        alert("שגיאה בטעינת הנתונים. בדוק את ה‑Console.");
      }
    }

    function renderBanks(banks) {
      const container = document.getElementById("banks-cards");
      if (!banks || banks.length === 0) {
        container.innerHTML = `<div style="color:#666">אין בנקים להצגה</div>`;
        return;
      }

      container.innerHTML = banks.map(b => `
        <div class="admin-card">
          <div class="admin-card-title">${escapeHtml(b.bank)}</div>
          <div class="admin-card-field">סוג: ${escapeHtml(b.type)}</div>
          <div class="admin-card-field">שווי: ₪${Number(b.valueIls || 0)}</div>
          <button class="edit-btn" onclick='openModal("bank", ${JSON.stringify(b).replace(/"/g,'&quot;')})'>ערוך</button>
        </div>
      `).join("");
    }

    // כרטיסי חיסכון לכל ילד — תצוגה עם השמות החדשים
    function renderKids(kids) {
      const container = document.getElementById("kids-cards");
      if (!kids || kids.length === 0) {
        container.innerHTML = `<div style="color:#666">אין חיסכון לילדים להצגה</div>`;
        return;
      }

      container.innerHTML = kids.map(k => {
        const name = k.childName || k.name || "";
        const value = Number(k.value || k.valueIls || 0);
        const depositsTel = Number(k.depositsTel || k.deposits || 0);
        const depositsParents = Number(k.depositsParents || 0);
        const manager = k.manager || k.provider || "";
        return `
          <div class="admin-card">
            <div class="admin-card-title">${escapeHtml(name)}</div>
            <div class="admin-card-field">שווי נוכחי: ₪${value}</div>
            <div class="admin-card-field">הפקדה בט\"ל: ₪${depositsTel}</div>
            <div class="admin-card-field">הפקדה הורים: ₪${depositsParents}</div>
            <div class="admin-card-field">מנהלת: ${escapeHtml(manager)}</div>
            <button class="edit-btn" onclick='openModal("kid", ${JSON.stringify(k).replace(/"/g,'&quot;')})'>ערוך</button>
          </div>
        `;
      }).join("");
    }

    function openModal(type, data) {
      currentEdit = { type, data };
      document.getElementById("modal-title").innerText =
        type === "kid" ? "עריכת חיסכון לילד" :
        type === "bank" ? "עריכת בנק" :
        "עריכה";

      let html = "";

      if (type === "bank") {
        html += `<label>שם הבנק</label><input id="f-bank" value="${escapeHtml(data.bank || '')}" placeholder="שם הבנק">`;
        html += `<label>סוג חשבון</label><input id="f-type" value="${escapeHtml(data.type || '')}" placeholder="סוג חשבון">`;
        html += `<label>שווי (₪)</label><input id="f-value" value="${escapeHtml(data.valueIls || 0)}" placeholder="שווי (₪)" type="number">`;
      }

      if (type === "kid") {
        html += `<label>שם</label><input id="f-name" value="${escapeHtml(data.childName || data.name || '')}" placeholder="שם הילד">`;
        html += `<label>שווי נוכחי (₪)</label><input id="f-value" value="${escapeHtml(data.value || data.valueIls || 0)}" placeholder="שווי נוכחי" type="number">`;
        html += `<label>הפקדה בט\"ל (₪)</label><input id="f-depositsTel" value="${escapeHtml(data.depositsTel || data.deposits || 0)}" placeholder="הפקדה בט\"ל" type="number">`;
        html += `<label>הפקדה הורים (₪)</label><input id="f-depositsParents" value="${escapeHtml(data.depositsParents || 0)}" placeholder="הפקדה הורים" type="number">`;
        html += `<label>מנהלת (שם החברה)</label><input id="f-manager" value="${escapeHtml(data.manager || data.provider || '')}" placeholder="שם החברה המנהלת">`;
      }

      document.getElementById("modal-fields").innerHTML = html;
      document.getElementById("modal-overlay").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal-overlay").style.display = "none";
    }

    // שמירה: שולח כ‑form-urlencoded כדי למנוע preflight CORS
    async function saveModal() {
      if (!currentEdit) return alert("אין מה לשמור");

      const { type, data } = currentEdit;
      let payload = { action: "" };

      if (type === "bank") {
        payload = {
          action: "update_bank",
          bank: document.getElementById("f-bank").value,
          type: document.getElementById("f-type").value,
          value: document.getElementById("f-value").value
        };
      } else if (type === "kid") {
        payload = {
          action: "update_kid",
          // נשלח גם מזהה גולמי כדי לעזור לשרת למצוא את השורה המדויקת (אם קיים)
          // אם אין id, השרת ימצא לפי שם
          name: document.getElementById("f-name").value,
          value: document.getElementById("f-value").value,
          depositsTel: document.getElementById("f-depositsTel").value,
          depositsParents: document.getElementById("f-depositsParents").value,
          manager: document.getElementById("f-manager").value
        };
      } else {
        return alert("סוג פריט לא נתמך לעריכה");
      }

      try {
        const params = new URLSearchParams();
        for (const k in payload) {
          if (payload[k] !== undefined && payload[k] !== null) {
            params.append(k, String(payload[k]));
          }
        }

        const res = await fetch(API_URL, { method: "POST", body: params });
        const json = await res.json();

        if (!json.ok) {
          console.error("Server error detail:", json.debug || json);
          alert("שגיאה בשמירה: " + (json.error || "לא ידוע") + ". בדוק את ה‑Console לפרטים.");
          return;
        }

        closeModal();
        await loadData();
        alert("עודכן בהצלחה");
      } catch (err) {
        console.error("Save error:", err);
        alert("שגיאה בתקשורת עם השרת. בדוק את ה‑Console.");
      }
    }

    function escapeHtml(s) {
      if (s === null || s === undefined) return "";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    }

    loadData();
  </script>

</body>
</html>
