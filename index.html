<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סקירה כללית – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-overview">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item active"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
  </nav>

  <div class="page">

    <!-- כותרת -->
    <div class="page-header">
      <div>
        <h1>סקירה כללית</h1>
        <div class="page-subtitle" id="overview-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- כרטיסים -->
    <div class="cards-row">

      <div class="card">
        <div class="card-title">שווי כולל</div>
        <div class="card-main" id="overview-total-value">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח כולל</div>
        <div class="card-main card-positive" id="overview-total-pl">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">תשואה כוללת</div>
        <div class="card-main" id="overview-total-yield">0%</div>
      </div>

      <div class="card">
        <div class="card-title">מספר חשבונות</div>
        <div class="card-main" id="overview-total-accounts">0</div>
      </div>

    </div>

    <!-- טבלה -->
    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px;">סיכום לפי חשבון</h2>

      <table id="accountsTable">
        <thead>
          <tr>
            <th>חשבון <span class="sort" data-sort="name">⇅</span></th>
            <th>שווי (₪) <span class="sort" data-sort="value">⇅</span></th>
            <th>רווח (₪) <span class="sort" data-sort="profit">⇅</span></th>
            <th>אחוז מהתיק <span class="sort" data-sort="percent">⇅</span></th>
            <th>קטגוריה</th>
          </tr>
        </thead>
        <tbody id="overview-table-body">
          <tr><td colspan="5">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- גרף עמודות -->
    <div class="cards-row">
      <div class="card" style="padding:25px;">
        <h3 style="margin-bottom:15px;">שווי ורווח לפי חשבון</h3>
        <canvas id="overview-bar" height="140"></canvas>
      </div>
    </div>

    <!-- גרף עוגה קטן בתחתית -->
    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; font-size:15px;">התפלגות תיק</h3>
        <canvas id="overview-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL");
    }

    let accounts = [];
    let sortDirection = 1;

    async function loadOverview() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const ibkr       = data.ibkr?.summary || {};
      const fair       = data.fair || [];
      const banks      = data.banks || [];
      const kids       = data.kids || [];
      const hishtalmut = data.hishtalmut || {};

      document.getElementById("overview-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const fairTotal       = fair.reduce((s, r) => s + Number(r["שווי נוכחי (₪)"] || 0), 0);
      const fairProfit      = fair.reduce((s, r) => s + Number(r["רווח/הפסד (₪)"] || 0), 0);

      const banksTotal      = banks.reduce((s, r) => s + Number(r.valueIls || 0), 0);

      const kidsTotal       = kids.reduce((s, r) => s + Number(r.value || 0), 0);
      const kidsProfit      = kids.reduce((s, r) => s + (Number(r.value || 0) - Number(r.deposits || 0)), 0);

      const hishtalmutTotal  = Number(hishtalmut.value || 0);
      const hishtalmutProfit = Number(hishtalmut.profit || 0);

      const ibkrTotal       = ibkr.totalValueIls || 0;
      const ibkrProfit      = ibkr.totalProfitIls || 0;

      const totalValue =
        fairTotal + banksTotal + kidsTotal + hishtalmutTotal + ibkrTotal;

      const totalProfit =
        fairProfit + kidsProfit + hishtalmutProfit + ibkrProfit;

      document.getElementById("overview-total-value").innerText =
        "₪" + format(totalValue);

      document.getElementById("overview-total-pl").innerText =
        (totalProfit >= 0 ? "+" : "") + "₪" + format(totalProfit);

      document.getElementById("overview-total-yield").innerText =
        totalValue > 0 ? ((totalProfit / (totalValue - totalProfit)) * 100).toFixed(2) + "%" : "0%";

      document.getElementById("overview-total-accounts").innerText = 5;

      accounts = [
        { name: "IBKR", value: ibkrTotal,       profit: ibkrProfit,       type: "השקעות" },
        { name: "FAIR", value: fairTotal,       profit: fairProfit,       type: "קרנות" },
        { name: "בנקים", value: banksTotal,     profit: 0,                type: "בנק" },
        { name: "קרן השתלמות", value: hishtalmutTotal, profit: hishtalmutProfit, type: "פנסיה" },
        { name: "חיסכון לכל ילד", value: kidsTotal, profit: kidsProfit,   type: "ילדים" }
      ];

      accounts = accounts.map(a => ({
        ...a,
        percent: totalValue > 0 ? (a.value / totalValue) * 100 : 0
      }));

      renderTable();
      renderBarChart();
      renderPieChart();
    }

    function renderTable() {
      const tbody = document.getElementById("overview-table-body");
      tbody.innerHTML = "";

      accounts.forEach(a => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${a.name}</td>
          <td>₪${format(a.value)}</td>
          <td class="${a.profit >= 0 ? 'value-positive' : 'value-negative'}">
            ${a.profit >= 0 ? '+' : ''}₪${format(a.profit)}
          </td>
          <td>${a.percent.toFixed(2)}%</td>
          <td>${a.type}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderPieChart() {
      new Chart(document.getElementById("overview-chart"), {
        type: "pie",
        data: {
          labels: accounts.map(a => a.name),
          datasets: [{
            data: accounts.map(a => a.value),
            backgroundColor: ["#6A4FF7", "#0A8A2A", "#00A8A8", "#FF8A3D", "#E84E89"]
          }]
        }
      });
    }

    function renderBarChart() {
      new Chart(document.getElementById("overview-bar"), {
        type: "bar",
        data: {
          labels: accounts.map(a => a.name),
          datasets: [
            {
              label: "שווי נוכחי (₪)",
              data: accounts.map(a => a.value),
              backgroundColor: "rgba(54, 162, 235, 0.7)"
            },
            {
              label: "רווח (₪)",
              data: accounts.map(a => a.profit),
              backgroundColor: "rgba(255, 99, 132, 0.7)"
            }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: "bottom" } },
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
    }

    document.addEventListener("click", e => {
      if (!e.target.classList.contains("sort")) return;

      const field = e.target.dataset.sort;
      sortDirection *= -1;

      accounts.sort((a, b) => (a[field] - b[field]) * sortDirection);

      renderTable();
    });

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadOverview();
  </script>

</body>
</html>
