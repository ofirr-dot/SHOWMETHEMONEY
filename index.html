<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סקירה כללית – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-overview">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item active"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>סקירה כללית</h1>
        <div class="page-subtitle" id="overview-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- טבלה: סיכום לפי חשבון -->
    <div class="card" style="padding:25px;">
      <h3>סיכום לפי חשבון</h3>

      <table id="accountsTable" class="styled-table">
        <thead>
          <tr>
            <th>חשבון <span class="sort" data-sort="name">⇅</span></th>
            <th>שווי (₪) <span class="sort" data-sort="value">⇅</span></th>
            <th>רווח (₪) <span class="sort" data-sort="profit">⇅</span></th>
            <th>אחוז מהתיק <span class="sort" data-sort="percent">⇅</span></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbwkdPCUeSG9wZcCA7SczlRHwi2MXkqAoZCNlbgtbYoO43Vuk50ZK_G8RtVb-KsxvoDXKg/exec?mode=api";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL");
    }

    let accounts = [];
    let sortDirection = 1;

    async function loadOverview() {

      document.getElementById("overview-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const res = await fetch(API_URL);
      const data = await res.json();

      const ibkr       = data.ibkr?.summary || {};
      const fair       = data.fair || [];
      const banks      = data.banks || [];
      const kids       = data.kids || [];
      const hishtalmut = data.hishtalmut || {};

      // חישוב ערכים
      const fairTotal       = fair.reduce((s, r) => s + Number(r["שווי נוכחי (₪)"] || 0), 0);
      const fairProfit      = fair.reduce((s, r) => s + Number(r["רווח/הפסד (₪)"] || 0), 0);

      const banksTotal      = banks.reduce((s, r) => s + Number(r.valueIls || 0), 0);

      const kidsTotal       = kids.reduce((s, r) => s + Number(r.value || 0), 0);
      const kidsProfit      = kids.reduce((s, r) =>
        s + (Number(r.value || 0) - Number(r.deposits || 0)), 0);

      const hishtalmutTotal = Number(hishtalmut.value || 0);
      const hishtalmutProfit = Number(hishtalmut.profit || 0);

      const ibkrTotal       = ibkr.totalValueIls || 0;
      const ibkrProfit      = ibkr.totalProfitIls || 0;

      const totalValue =
        fairTotal + banksTotal + kidsTotal + hishtalmutTotal + ibkrTotal;

      // בניית מערך חשבונות
      accounts = [
        { name: "IBKR", value: ibkrTotal, profit: ibkrProfit },
        { name: "FAIR", value: fairTotal, profit: fairProfit },
        { name: "בנקים", value: banksTotal, profit: 0 },
        { name: "ילדים", value: kidsTotal, profit: kidsProfit },
        { name: "השתלמות", value: hishtalmutTotal, profit: hishtalmutProfit }
      ];

      // חישוב אחוזים
      accounts = accounts.map(a => ({
        ...a,
        percent: totalValue > 0 ? (a.value / totalValue) * 100 : 0
      }));

      renderTable();
    }

    function renderTable() {
      const tbody = document.querySelector("#accountsTable tbody");
      tbody.innerHTML = "";

      accounts.forEach(a => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${a.name}</td>
          <td>₪${format(a.value)}</td>
          <td>${a.profit >= 0 ? "+" : ""}₪${format(a.profit)}</td>
          <td>${a.percent.toFixed(2)}%</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // מיון
    document.addEventListener("click", e => {
      if (!e.target.classList.contains("sort")) return;

      const field = e.target.dataset.sort;
      sortDirection *= -1;

      accounts.sort((a, b) => (a[field] - b[field]) * sortDirection);

      renderTable();
    });

    // מצב כהה
    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadOverview();
  </script>

</body>
</html>
