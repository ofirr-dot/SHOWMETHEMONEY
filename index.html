<script>
  const API_URL = "https://script.google.com/macros/s/XXXXXXXXXXXX/exec?mode=api";

  function format(n) {
    return Number(n).toLocaleString("he-IL");
  }

  async function loadPage() {
    const res = await fetch(API_URL);
    const data = await res.json();

    const ibkr       = data.ibkr.summary || {};
    const fair       = data.fair || [];
    const banks      = data.banks || [];
    const kids       = data.kids || [];
    const hishtalmut = data.hishtalmut || {};
    const usdRate    = data.usdRate || 0;

    document.getElementById("index-timestamp").innerText =
      new Date().toLocaleString("he-IL");

    /************************************
     * 1) חישוב שווי כולל של כל המערכת
     ************************************/
    const fairTotal       = fair.reduce((s, r) => s + Number(r["שווי נוכחי (₪)"] || r.valueIls || 0), 0);
    const banksTotal      = banks.reduce((s, r) => s + Number(r["ערך בש״ח"] || r.valueIls || 0), 0);
    const kidsTotal       = kids.reduce((s, r) => s + Number(r["שווי נוכחי (₪)"] || r.value || 0), 0);
    const hishtalmutTotal = Number(hishtalmut.value || 0);

    const totalValue =
      (ibkr.totalValueIls || 0) +
      fairTotal +
      banksTotal +
      kidsTotal +
      hishtalmutTotal;

    /************************************
     * 2) חישוב רווח כולל
     ************************************/
    const kidsProfit       = kids.reduce((s, r) => s + (Number(r["שווי נוכחי (₪)"] || r.value || 0) - Number(r["הפקדות מצטברות (₪)"] || r.totalDeposits || 0)), 0);
    const fairProfit       = fair.reduce((s, r) => s + Number(r["רווח/הפסד (₪)"] || r.plIls || 0), 0);
    const banksProfit      = 0; // בנקים = מזומן → אין רווח
    const hishtalmutProfit = Number(hishtalmut.profit || 0);
    const ibkrProfit       = ibkr.totalProfitIls || 0;

    const totalProfit =
      kidsProfit +
      fairProfit +
      hishtalmutProfit +
      ibkrProfit;

    const totalYield = totalValue > 0 ? (totalProfit / (totalValue - totalProfit)) * 100 : 0;

    /************************************
     * 3) הצגת נתונים בכרטיסים
     ************************************/
    document.getElementById("index-total-value").innerText = "₪" + format(totalValue);
    document.getElementById("index-total-profit").innerText =
      (totalProfit >= 0 ? "+" : "") + "₪" + format(totalProfit);
    document.getElementById("index-total-yield").innerText = totalYield.toFixed(2) + "%";

    /************************************
     * 4) גרף התפלגות תיק
     ************************************/
    const labels = ["IBKR", "FAIR", "בנקים", "ילדים", "השתלמות"];
    const values = [
      ibkr.totalValueIls || 0,
      fairTotal,
      banksTotal,
      kidsTotal,
      hishtalmutTotal
    ];

    new Chart(document.getElementById("index-chart"), {
      type: "pie",
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: ["#4A90E2", "#50E3C2", "#F5A623", "#E84E89", "#7B61FF"]
        }]
      }
    });
  }

  /************************************
   * מצב כהה + Header דינמי
   ************************************/
  document.getElementById("themeToggle").onclick = () => {
    document.body.classList.toggle("dark");
    themeToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
  };

  window.addEventListener("scroll", () => {
    const nav = document.querySelector(".top-nav");
    if (window.scrollY > 40) nav.classList.add("shrink");
    else nav.classList.remove("shrink");
  });

  loadPage();
</script>
