<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סקירה כללית – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="top-nav">
    <a href="index.html" class="nav-item active">סקירה כללית</a>
    <a href="ibkr.html" class="nav-item">IBKR</a>
    <a href="fair.html" class="nav-item">FAIR</a>
    <a href="banks.html" class="nav-item">בנקים</a>
    <a href="hishtalmut.html" class="nav-item">קרן השתלמות</a>
    <a href="kids.html" class="nav-item">חיסכון לכל ילד</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>סקירה כללית</h1>
        <div class="page-subtitle" id="overview-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">
      <div class="card">
        <div class="card-title">סה״כ גורמים</div>
        <div class="card-main" id="overview-total-entities">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">סה״כ ג'י ל'</div>
        <div class="card-main" id="overview-total-gl">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">סה״כ מסנן</div>
        <div class="card-main" id="overview-total-filter">₪0</div>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>שם</th>
            <th>סוג</th>
            <th>שווי נוכחי</th>
            <th>רווח/הפסד</th>
            <th>תשואה</th>
            <th>תאריך עדכון</th>
          </tr>
        </thead>
        <tbody id="overview-table-body">
          <tr><td colspan="6">נתונים יתווספו בהמשך</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.getElementById("overview-timestamp").innerText =
      new Date().toLocaleString("he-IL");
  </script>

</body>
</html>
