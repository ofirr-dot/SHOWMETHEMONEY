<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>IBKR – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-ibkr">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- סרגל ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item active"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
    <a href="admin.html" class="nav-item"><span class="icon">⚙️</span> ניהול נתונים</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>IBKR</h1>
        <div class="page-subtitle" id="ibkr-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">
      <div class="card">
        <div class="card-title">שווי כולל (₪)</div>
        <div class="card-main" id="ibkr-total-ils">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח/הפסד (₪)</div>
        <div class="card-main" id="ibkr-total-pl">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">מספר פוזיציות</div>
        <div class="card-main" id="ibkr-count">0</div>
      </div>
    </div>

    <div class="table-wrapper">
      <h3 style="margin-bottom:10px;">פוזיציות פתוחות</h3>
      <table>
        <thead>
          <tr>
            <th>סימול</th>
            <th>תיאור</th>
            <th>כמות</th>
            <th>מחיר</th>
            <th>שווי (₪)</th>
            <th>רווח/הפסד</th>
          </tr>
        </thead>
        <tbody id="ibkr-table-body">
          <tr><td colspan="6">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; text-align:center;">התפלגות לפי נכס</h3>
        <canvas id="ibkr-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function fmt(n) {
      return Number(n || 0).toLocaleString("he-IL", { maximumFractionDigits: 2 });
    }

    async function loadIbkr() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const positions = data.ibkr?.positions || [];
      const summary = data.ibkr?.summary || {};

      document.getElementById("ibkr-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const totalValue = summary.totalValueIls || 0;
      const totalProfit = summary.totalProfitIls || 0;

      document.getElementById("ibkr-total-ils").innerText = "₪" + fmt(totalValue);
      document.getElementById("ibkr-total-pl").innerText =
        (totalProfit >= 0 ? "+" : "") + "₪" + fmt(totalProfit);
      document.getElementById("ibkr-count").innerText = positions.length;

      const tbody = document.getElementById("ibkr-table-body");
      tbody.innerHTML = "";

      positions.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.symbol}</td>
          <td>${p.description}</td>
          <td>${fmt(p.quantity)}</td>
          <td>${fmt(p.marketPrice)}</td>
          <td>₪${fmt(p.marketValueIls)}</td>
          <td class="${p.unrealizedPlIls >= 0 ? 'value-positive' : 'value-negative'}">
            ${(p.unrealizedPlIls >= 0 ? '+' : '')}₪${fmt(p.unrealizedPlIls)}
          </td>
        `;
        tbody.appendChild(tr);
      });

      new Chart(document.getElementById("ibkr-chart"), {
        type: "pie",
        data: {
          labels: positions.map(p => p.symbol),
          datasets: [{
            data: positions.map(p => p.marketValueIls),
            backgroundColor: ["#6A4FF7", "#0A8A2A", "#00A8A8", "#FF8A3D", "#E84E89"]
          }]
        }
      });
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadIbkr();
  </script>

</body>
</html>
