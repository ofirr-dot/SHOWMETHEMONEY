<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>IBKR – פוזיציות פתוחות</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-overview">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item active"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>📈 פוזיציות פתוחות – IBKR</h1>
        <div class="page-subtitle">נתונים חיים מה‑IBKR FLEX API</div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="realized-table-wrapper">
      <table id="ibkr-table">
        <thead>
          <tr>
            <th>סימבול</th>
            <th>שם</th>
            <th>כמות</th>
            <th>מחיר קנייה ($)</th>
            <th>מחיר נוכחי ($)</th>
            <th>שווי ($)</th>
            <th>רווח ($)</th>
            <th>שווי (₪)</th>
            <th>רווח (₪)</th>
          </tr>
        </thead>

        <tbody id="ibkr-body"></tbody>

        <tfoot>
          <tr id="ibkr-summary">
            <td colspan="9" style="text-align:center; padding:15px;">
              טוען נתונים…
            </td>
          </tr>
        </tfoot>
      </table>
    </div>

  </div>

  <script>
    const API_URL = "YOUR_APPSCRIPT_URL_HERE";

    async function loadIbkr() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const usdRate = data.ibkr.summary.usdRate;
      const rows = data.ibkr.positions;

      const tbody = document.getElementById("ibkr-body");
      const summary = document.getElementById("ibkr-summary");

      tbody.innerHTML = "";

      let totalUsd = 0;
      let totalIls = 0;
      let totalPlUsd = 0;
      let totalPlIls = 0;

      rows.forEach(p => {
        const plUsd = p.unrealizedPlUsd;
        const plIls = p.unrealizedPlIls;

        totalUsd += p.marketValueUsd;
        totalIls += p.marketValueIls;
        totalPlUsd += plUsd;
        totalPlIls += plIls;

        const plClassUsd = plUsd >= 0 ? "value-positive" : "value-negative";
        const plClassIls = plIls >= 0 ? "value-positive" : "value-negative";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.symbol}</td>
          <td>${p.description}</td>
          <td>${p.quantity}</td>
          <td>${p.costBasis.toLocaleString()}</td>
          <td>${p.marketPrice.toLocaleString()}</td>
          <td>${p.marketValueUsd.toLocaleString()}</td>
          <td class="${plClassUsd}">${plUsd.toLocaleString()}</td>
          <td>${p.marketValueIls.toLocaleString()}</td>
          <td class="${plClassIls}">${plIls.toLocaleString()}</td>
        `;
        tbody.appendChild(tr);
      });

      summary.innerHTML = `
        <td colspan="9" style="text-align:center; font-size:18px;">
          סה״כ שווי ($): ${totalUsd.toLocaleString()} ·
          סה״כ שווי (₪): ${totalIls.toLocaleString()} ·
          סה״כ רווח ($): ${totalPlUsd.toLocaleString()} ·
          סה״כ רווח (₪): ${totalPlIls.toLocaleString()}
        </td>
      `;
    }

    // מצב כהה/בהיר
    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadIbkr();
  </script>

</body>
</html>
