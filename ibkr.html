<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>IBKR – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-ibkr">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item active"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>IBKR</h1>
        <div class="page-subtitle" id="ibkr-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">

      <div class="card">
        <div class="card-title">שווי תיק</div>
        <div class="card-main" id="ibkr-total-value">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח כולל</div>
        <div class="card-main card-positive" id="ibkr-total-pl">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">תשואה</div>
        <div class="card-main" id="ibkr-total-yield">0%</div>
      </div>

    </div>

    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px;">פוזיציות פתוחות</h2>

      <table>
        <thead>
          <tr>
            <th>סימול</th>
            <th>שם</th>
            <th>כמות</th>
            <th>מחיר קנייה</th>
            <th>מחיר נוכחי</th>
            <th>שווי (₪)</th>
            <th>רווח/הפסד (₪)</th>
          </tr>
        </thead>

        <tbody id="ibkr-table-body">
          <tr><td colspan="7">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", {
        maximumFractionDigits: 2
      });
    }

    async function loadIBKR() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const summary = data.ibkr?.summary || {};
      const positions = data.ibkr?.positions || [];

      document.getElementById("ibkr-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const totalValue = Number(summary.totalValueIls || 0);
      const totalProfit = Number(summary.totalProfitIls || 0);
      const totalYield =
        totalValue > 0 ? (totalProfit / (totalValue - totalProfit)) * 100 : 0;

      document.getElementById("ibkr-total-value").innerText =
        "₪" + format(totalValue);

      document.getElementById("ibkr-total-pl").innerText =
        (totalProfit >= 0 ? "+" : "") + "₪" + format(totalProfit);

      document.getElementById("ibkr-total-yield").innerText =
        totalYield.toFixed(2) + "%";

      const tbody = document.getElementById("ibkr-table-body");
      tbody.innerHTML = "";

      positions.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.symbol}</td>
          <td>${p.description}</td>
          <td>${format(p.quantity)}</td>
          <td>${format(p.costUsd)}</td>
          <td>${format(p.priceUsd)}</td>
          <td>₪${format(p.valueIls)}</td>
          <td class="${p.plIls >= 0 ? 'value-positive' : 'value-negative'}">
            ${p.plIls >= 0 ? '+' : ''}₪${format(p.plIls)}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadIBKR();
  </script>

</body>
</html>
