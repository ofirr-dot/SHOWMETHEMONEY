<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סקירה כללית – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-overview">

  <!-- כפתור מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- ניווט עליון -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item active"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
  </nav>

  <div class="page">

    <!-- כותרת -->
    <div class="page-header">
      <div>
        <h1>סקירה כללית</h1>
        <div class="page-subtitle" id="overview-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- כרטיסי סיכום -->
    <div class="cards-row">

      <div class="card">
        <div class="card-title">שווי כולל</div>
        <div class="card-main" id="overview-total-value">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח כולל</div>
        <div class="card-main card-positive" id="overview-total-pl">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">תשואה כוללת</div>
        <div class="card-main" id="overview-total-yield">0%</div>
      </div>

      <div class="card">
        <div class="card-title">מספר חשבונות</div>
        <div class="card-main" id="overview-total-accounts">0</div>
      </div>

    </div>

    <!-- כרטיס גרף עוגה -->
    <div class="cards-row">
      <div class="card" style="padding:25px;">
        <h3 style="margin-bottom:15px;">התפלגות תיק לפי חשבון</h3>
        <canvas id="overviewPie" height="120"></canvas>
      </div>
    </div>

    <!-- טבלה -->
    <div class="table-wrapper">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h2 style="font-size:16px;margin:0;">סיכום לפי חשבון</h2>
        <span class="table-caption">FAIR · IBKR · בנקים · קרנות · ילדים</span>
      </div>

      <table>
        <thead>
          <tr>
            <th>שם החשבון</th>
            <th>שווי נוכחי</th>
            <th>רווח/הפסד</th>
            <th>תשואה</th>
            <th>קטגוריה</th>
          </tr>
        </thead>

        <tbody id="overview-table-body">
          <tr><td colspan="5">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

  </div>

  <script>
    // נתוני דמו עד שיהיה API אמיתי
    const demoOverview = [
      { name: "FAIR", value: 681886, pl: 212019, yield: 45.15, type: "קרנות" },
      { name: "IBKR", value: 654983, pl: 219058, yield: 33.4, type: "השקעות" },
      { name: "Chase Savings", value: 44453, pl: 0, yield: 0, type: "בנק" },
      { name: "Chase Checking", value: 50931, pl: 0, yield: 0, type: "בנק" },
      { name: "בנק הפועלים", value: 40187, pl: 0, yield: 0, type: "בנק" },
      { name: "קרן השתלמות", value: 29350, pl: 15121, yield: 48.0, type: "פנסיה" },
      { name: "חיסכון לכל ילד", value: 29350, pl: 15121, yield: 48.0, type: "ילדים" }
    ];

    function format(n) {
      return Number(n).toLocaleString("he-IL");
    }

    function loadOverview() {
      // זמן
      document.getElementById("overview-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const tbody = document.getElementById("overview-table-body");
      tbody.innerHTML = "";

      let totalValue = 0;
      let totalPL = 0;

      demoOverview.forEach(acc => {
        totalValue += acc.value;
        totalPL += acc.pl;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${acc.name}</td>
          <td>₪${format(acc.value)}</td>
          <td class="${acc.pl >= 0 ? 'value-positive' : 'value-negative'}">
            ${acc.pl >= 0 ? '+' : ''}₪${format(acc.pl)}
          </td>
          <td>${acc.yield}%</td>
          <td>${acc.type}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById("overview-total-value").innerText =
        "₪" + format(totalValue);

      document.getElementById("overview-total-pl").innerText =
        "₪" + format(totalPL);

      document.getElementById("overview-total-yield").innerText =
        ((totalPL / (totalValue - totalPL)) * 100).toFixed(2) + "%";

      document.getElementById("overview-total-accounts").innerText =
        demoOverview.length;

      // גרף עוגה
      const ctx = document.getElementById("overviewPie");
      if (ctx) {
        new Chart(ctx, {
          type: "pie",
          data: {
            labels: demoOverview.map(x => x.name),
            datasets: [{
              data: demoOverview.map(x => x.value),
              backgroundColor: [
                "#6A4FF7",
                "#0A8A2A",
                "#00A8A8",
                "#FF8A3D",
                "#E84E89",
                "#0070F3",
                "#9994FF"
              ]
            }]
          },
          options: {
            plugins: {
              legend: {
                position: "bottom",
                labels: { font: { family: "Assistant" } }
              }
            }
          }
        });
      }
    }

    // מצב כהה/בהיר
    const themeBtn = document.getElementById("themeToggle");
    themeBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      themeBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    });

    // Header דינמי
    window.addEventListener("scroll", () => {
      const nav = document.querySelector(".top-nav");
      if (window.scrollY > 40) nav.classList.add("shrink");
      else nav.classList.remove("shrink");
    });

    loadOverview();
  </script>

</body>
</html>
