<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>מס רווחי הון – Show Me The Money</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <script src="/loadHeader.js" defer></script>

  <style>
    .page { max-width:1100px; margin:20px auto; padding:16px; box-sizing:border-box; }
    .card { background:#fff; padding:16px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-bottom:16px; }
    .table-wrapper { background:#fff; padding:14px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow-x:auto; }
    .theme-btn { position:fixed; left:12px; top:12px; z-index:9999; width:44px; height:44px; border-radius:10px; border:1px solid rgba(0,0,0,0.06); background:#fff; cursor:pointer; }
  </style>
</head>
<body>

  <button id="themeToggle" class="theme-btn" aria-label="החלפת מצב אור/לילה">🌙</button>

  <div id="site-header"></div>

  <div class="page">
    <div class="card">
      <h1 style="margin:0 0 8px 0">מס רווחי הון</h1>
      <div class="small">כלים לחישוב מס, סיכום רווחים ממומשים והמלצות להצגה לרואה חשבון</div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px 0">חישוב מהיר</h3>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <div style="flex:1;min-width:220px;">
          <label>רווח ממומש (₪)</label>
          <input id="tax-profit" type="number" style="width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;margin-top:6px;">
        </div>
        <div style="flex:1;min-width:220px;">
          <label>שיעור מס משוער (%)</label>
          <input id="tax-rate" type="number" value="25" style="width:100%;padding:8px;border-radius:8px;border:1px solid #ddd;margin-top:6px;">
        </div>
        <div style="align-self:end;">
          <button id="tax-calc" class="refresh-btn" style="margin-top:6px;">חשב מס</button>
        </div>
      </div>

      <div style="margin-top:12px;">
        <strong>מס משוער:</strong> <span id="tax-result">₪0</span>
      </div>
    </div>

    <div class="table-wrapper">
      <h3 style="margin:0 0 8px 0">רווחים ממומשים (דוגמה)</h3>
      <table id="tax-table">
        <thead>
          <tr><th>שנה</th><th>סימול</th><th>רווח (₪)</th><th>מס משוער (₪)</th></tr>
        </thead>
        <tbody>
          <tr><td colspan="4">אין נתונים להצגה</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // כפתור אור/לילה
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        themeToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
      });
    }

    function fmt(n){ return Number(n||0).toLocaleString("he-IL",{maximumFractionDigits:2}); }

    document.getElementById("tax-calc").addEventListener("click", () => {
      const profit = Number(document.getElementById("tax-profit").value || 0);
      const rate = Number(document.getElementById("tax-rate").value || 0) / 100;
      const tax = profit * rate;
      document.getElementById("tax-result").innerText = "₪" + fmt(tax);
    });
  </script>
</body>
</html>
