<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מס רווחי הון – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">

  <style>
    table th, table td {
      text-align: center;
    }

    .bubble-row {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    .bubble {
      flex: 1;
      background: var(--card-bg);
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 90px;
    }

    .bubble-profit { color: #0A8A2A; }   /* ירוק */
    .bubble-tax { color: #D7263D; }      /* אדום */
    .bubble-net { color: #1E6BFF; }      /* כחול */
  </style>
</head>

<body class="theme-tax">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item active"><span class="icon">🧾</span> מס רווחי הון</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>מס רווחי הון</h1>
        <div class="page-subtitle" id="tax-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- שלוש בועות ממורכזות וצבועות -->
    <div class="bubble-row">
      <div class="bubble bubble-profit" id="bubble-profit">רווח כולל: ₪0</div>
      <div class="bubble bubble-tax" id="bubble-tax">מס 25%: ₪0</div>
      <div class="bubble bubble-net" id="bubble-net">נטו לאחר מס: ₪0</div>
    </div>

    <!-- טבלה -->
    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px; text-align:center;">רשימת רווחים לא ממומשים</h2>

      <table>
        <thead>
          <tr>
            <th>שם הקרן</th>
            <th>רווח לא ממומש (₪)</th>
            <th>מס 25% (₪)</th>
          </tr>
        </thead>

        <tbody id="tax-table-body">
          <tr><td colspan="3">טוען נתונים…</td></tr>
        </tbody>

        <tfoot>
          <tr id="tax-summary-row">
            <td colspan="3">טוען סיכום…</td>
          </tr>
        </tfoot>

      </table>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", {
        maximumFractionDigits: 2
      });
    }

    async function loadTax() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const fair = data.fair || [];

      document.getElementById("tax-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const tbody = document.getElementById("tax-table-body");
      const summaryRow = document.getElementById("tax-summary-row");

      tbody.innerHTML = "";

      let totalProfit = 0;
      let totalTax = 0;

      fair.forEach(f => {
        const profit = Number(f["רווח/הפסד (₪)"] || 0);
        const tax = profit * 0.25;

        totalProfit += profit;
        totalTax += tax;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${f["שם הקרן"]}</td>
          <td>₪${format(profit)}</td>
          <td>₪${format(tax)}</td>
        `;
        tbody.appendChild(tr);
      });

      const net = totalProfit - totalTax;

      // בועות
      document.getElementById("bubble-profit").innerText =
        "רווח כולל: ₪" + format(totalProfit);

      document.getElementById("bubble-tax").innerText =
        "מס 25%: ₪" + format(totalTax);

      document.getElementById("bubble-net").innerText =
        "נטו לאחר מס: ₪" + format(net);

      // שורה תחתונה בטבלה
      summaryRow.innerHTML = `
        <td colspan="3" style="font-weight:bold;">
          רווח כולל: ₪${format(totalProfit)} ·
          מס: ₪${format(totalTax)} ·
          נטו: ₪${format(net)}
        </td>
      `;
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadTax();
  </script>

</body>
</html>
