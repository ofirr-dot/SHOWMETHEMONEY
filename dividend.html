<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>דיבידנד – Show Me The Money</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <script src="/loadHeader.js" defer></script>

  <style>
    .page { max-width:1100px; margin:20px auto; padding:16px; box-sizing:border-box; }
    .card { background:#fff; padding:16px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-bottom:16px; }
    .table-wrapper { background:#fff; padding:14px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; margin-top:8px; }
    th, td { padding:10px; text-align:center; border-bottom:1px solid #eee; }
    .theme-btn { position:fixed; left:12px; top:12px; z-index:9999; width:44px; height:44px; border-radius:10px; border:1px solid rgba(0,0,0,0.06); background:#fff; cursor:pointer; }
  </style>
</head>
<body>

  <button id="themeToggle" class="theme-btn" aria-label="החלפת מצב אור/לילה">🌙</button>

  <div id="site-header"></div>

  <div class="page">
    <div class="page-header" style="margin-bottom:12px;">
      <h1>דיבידנד</h1>
      <div class="small">ריכוז דיבידנדים שהתקבלו והצעות למעקב</div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px 0">סיכום שנתי</h3>
      <div>סה"כ דיבידנדים שנתיים: <strong id="dividend-total">₪0</strong></div>
    </div>

    <div class="table-wrapper">
      <table id="dividend-table">
        <thead>
          <tr><th>תאריך</th><th>סימול</th><th>חברה</th><th>סכום (₪)</th><th>הערות</th></tr>
        </thead>
        <tbody>
          <tr><td colspan="5">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function safeNum(v){ if(v===null||v===undefined||v==="") return 0; const n=Number(String(v).replace(/\u00A0/g,"").replace(/,/g,"")); return isNaN(n)?0:n; }
    function fmt(n){ return Number(n||0).toLocaleString("he-IL",{maximumFractionDigits:2}); }

    async function loadDividends() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // נניח שיש שדה dividends או realized שמכיל דיבידנדים
        const list = Array.isArray(data.dividends) ? data.dividends : (Array.isArray(data.realized) ? data.realized.filter(x=>x.type==='dividend' || (x.symbol && x.proceedsUsd)) : []);
        const tbody = document.querySelector("#dividend-table tbody");
        tbody.innerHTML = "";

        if (!list || list.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5">אין נתונים להצגה</td></tr>`;
          document.getElementById("dividend-total").innerText = "₪0";
          return;
        }

        let total = 0;
        list.forEach(d => {
          const date = d.date || d.paymentDate || d.saleDate || "";
          const symbol = d.symbol || "";
          const company = d.company || d.description || "";
          const amount = safeNum(d.amountIls || d.amount || d.proceedsIls || d.proceeds || 0);
          total += amount;
          const notes = d.notes || d.note || "";
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${escapeHtml(date)}</td><td>${escapeHtml(symbol)}</td><td>${escapeHtml(company)}</td><td>₪${fmt(amount)}</td><td>${escapeHtml(notes)}</td>`;
          tbody.appendChild(tr);
        });

        document.getElementById("dividend-total").innerText = "₪" + fmt(total);

      } catch (err) {
        console.error("loadDividends error:", err);
        document.querySelector("#dividend-table tbody").innerHTML = `<tr><td colspan="5">שגיאה בטעינת הנתונים. בדוק את ה‑Console.</td></tr>`;
      }
    }

    // כפתור אור/לילה
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        themeToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
      });
    }

    function escapeHtml(s){ if(s===null||s===undefined) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

    document.addEventListener("DOMContentLoaded", () => {
      loadDividends();
    });
  </script>
</body>
</html>
