<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>דיבידנדים – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-dividend">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- סרגל ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
    <a href="admin.html" class="nav-item"><span class="icon">⚙️</span> ניהול נתונים</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>דיבידנדים</h1>
        <div class="page-subtitle" id="dividend-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">
      <div class="card">
        <div class="card-title">סה״כ דיבידנדים (₪)</div>
        <div class="card-main" id="dividend-total">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">מספר תשלומים</div>
        <div class="card-main" id="dividend-count">0</div>
      </div>
    </div>

    <div class="table-wrapper">
      <h3 style="margin-bottom:10px;">רשימת דיבידנדים</h3>

      <table>
        <thead>
          <tr>
            <th>תאריך</th>
            <th>סימול</th>
            <th>חברה</th>
            <th>סכום (₪)</th>
            <th>הערות</th>
          </tr>
        </thead>

        <tbody id="dividend-table-body">
          <tr><td colspan="5">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function fmt(n) {
      return Number(n || 0).toLocaleString("he-IL", { maximumFractionDigits: 2 });
    }

    async function loadDividends() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const list = data.dividends || [];

      document.getElementById("dividend-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const total = list.reduce((s, d) => s + Number(d.amountIls || d.amount || 0), 0);

      document.getElementById("dividend-total").innerText = "₪" + fmt(total);
      document.getElementById("dividend-count").innerText = list.length;

      const tbody = document.getElementById("dividend-table-body");
      tbody.innerHTML = "";

      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5">אין נתונים להצגה</td></tr>`;
        return;
      }

      list.forEach(d => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${d.date || d.paymentDate || ""}</td>
          <td>${d.symbol || ""}</td>
          <td>${d.company || d.description || ""}</td>
          <td>₪${fmt(d.amountIls || d.amount || 0)}</td>
          <td>${d.notes || ""}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadDividends();
  </script>

</body>
</html>
