<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>קרן השתלמות – Show Me The Money</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="/loadHeader.js" defer></script>

  <style>
    .page { max-width:1100px; margin:20px auto; padding:16px; box-sizing:border-box; }
    .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .cards-row { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:18px; }
    .card { background:#fff; padding:16px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .table-wrapper { background:#fff; padding:14px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; margin-top:8px; }
    th, td { padding:10px; text-align:center; border-bottom:1px solid #eee; }
    .theme-btn { position:fixed; left:12px; top:12px; z-index:9999; width:44px; height:44px; border-radius:10px; border:1px solid rgba(0,0,0,0.06); background:#fff; cursor:pointer; }
  </style>
</head>
<body>

  <button id="themeToggle" class="theme-btn" aria-label="החלפת מצב אור/לילה">🌙</button>

  <div id="site-header"></div>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>קרן השתלמות</h1>
        <div class="small" id="hishtalmut-timestamp">טוען...</div>
      </div>
      <div class="small">Ofir</div>
    </div>

    <div class="cards-row">
      <div class="card">
        <div class="card-title">שווי נוכחי (₪)</div>
        <div class="card-main" id="hishtalmut-value">₪0</div>
        <div class="card-sub small">ניתן לערוך דרך דף בנקים</div>
      </div>

      <div class="card">
        <div class="card-title">רווח/הפסד (₪)</div>
        <div class="card-main" id="hishtalmut-profit">₪0</div>
        <div class="card-sub small">עדכון אחרון: <span id="hishtalmut-last-update">—</span></div>
      </div>

      <div class="card">
        <div class="card-title">הערות</div>
        <div class="card-main small" id="hishtalmut-notes">—</div>
      </div>
    </div>

    <div class="table-wrapper">
      <h3 style="margin:0 0 8px 0">פרטי קרן השתלמות</h3>
      <table id="hishtalmut-table">
        <thead>
          <tr>
            <th>שם פריט</th>
            <th>שווי (₪)</th>
            <th>רווח/הפסד (₪)</th>
            <th>תאריך עדכון</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function safeNum(v){ if(v===null||v===undefined||v==="") return 0; const n=Number(String(v).replace(/\u00A0/g,"").replace(/,/g,"")); return isNaN(n)?0:n; }
    function fmt(n){ return Number(n||0).toLocaleString("he-IL",{maximumFractionDigits:2}); }

    async function loadHishtalmut() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // ניסיון למצוא קרן השתלמות ברשימת הבנקים או בשדה hishtalmut
        let hisht = data.hishtalmut || null;
        if ((!hisht || !hisht.value) && Array.isArray(data.banks)) {
          const found = data.banks.find(b => (String(b.bank || b["מוסד פיננסי"] || "").toLowerCase().indexOf("השתלמות") !== -1));
          if (found) {
            hisht = { value: found.valueIls || found.value || 0, profit: found.profit || 0, notes: found.notes || "" };
          }
        }

        if (!hisht) {
          document.getElementById("hishtalmut-value").innerText = "₪0";
          document.getElementById("hishtalmut-profit").innerText = "₪0";
          document.getElementById("hishtalmut-notes").innerText = "אין נתונים";
          document.querySelector("#hishtalmut-table tbody").innerHTML = `<tr><td colspan="4">אין נתונים להצגה</td></tr>`;
          document.getElementById("hishtalmut-timestamp").innerText = new Date().toLocaleString("he-IL");
          return;
        }

        const value = safeNum(hisht.value || hisht.valueIls || 0);
        const profit = safeNum(hisht.profit || 0);

        document.getElementById("hishtalmut-value").innerText = "₪" + fmt(value);
        document.getElementById("hishtalmut-profit").innerText = (profit>=0?"+":"") + "₪" + fmt(profit);
        document.getElementById("hishtalmut-notes").innerText = hisht.notes || "—";
        document.getElementById("hishtalmut-last-update").innerText = new Date().toLocaleString("he-IL");
        document.getElementById("hishtalmut-timestamp").innerText = new Date().toLocaleString("he-IL");

        // טבלה פשוטה — אם יש פירוט בקרן
        const tbody = document.querySelector("#hishtalmut-table tbody");
        tbody.innerHTML = "";
        if (Array.isArray(data.fair) && data.fair.length > 0) {
          // אם יש רשימת פריטים רלוונטית, הצג אותם
          data.fair.forEach(item => {
            const name = item["שם הקרן"] || item.name || "קרן";
            const val = safeNum(item["שווי נוכחי (₪)"] || item.value || 0);
            const prof = safeNum(item["רווח/הפסד (₪)"] || item.profit || 0);
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${escapeHtml(name)}</td><td>₪${fmt(val)}</td><td class="${prof>=0?'value-positive':'value-negative'}">${prof>=0?'+':''}₪${fmt(prof)}</td><td>—</td>`;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = `<tr><td>קרן השתלמות</td><td>₪${fmt(value)}</td><td class="${profit>=0?'value-positive':'value-negative'}">${profit>=0?'+':''}₪${fmt(profit)}</td><td>${new Date().toLocaleDateString("he-IL")}</td></tr>`;
        }

      } catch (err) {
        console.error("loadHishtalmut error:", err);
        document.querySelector("#hishtalmut-table tbody").innerHTML = `<tr><td colspan="4">שגיאה בטעינת הנתונים. בדוק את ה‑Console.</td></tr>`;
      }
    }

    // כפתור אור/לילה
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        themeToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
      });
    }

    function escapeHtml(s){ if(s===null||s===undefined) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

    document.addEventListener("DOMContentLoaded", () => {
      loadHishtalmut();
    });
  </script>
</body>
</html>
