<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>קרן השתלמות – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-hishtalmut">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- סרגל ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item active"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
    <a href="admin.html" class="nav-item"><span class="icon">⚙️</span> ניהול נתונים</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>קרן השתלמות</h1>
        <div class="page-subtitle" id="hishtalmut-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">
      <div class="card">
        <div class="card-title">שווי נוכחי (₪)</div>
        <div class="card-main" id="hishtalmut-value">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח/הפסד (₪)</div>
        <div class="card-main" id="hishtalmut-profit">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">הערות</div>
        <div class="card-main" id="hishtalmut-notes">—</div>
      </div>
    </div>

    <div class="table-wrapper">
      <h3 style="margin-bottom:10px;">פירוט קרן השתלמות</h3>

      <table>
        <thead>
          <tr>
            <th>שם</th>
            <th>שווי (₪)</th>
            <th>רווח/הפסד (₪)</th>
            <th>תאריך</th>
          </tr>
        </thead>

        <tbody id="hishtalmut-table-body">
          <tr><td colspan="4">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function fmt(n) {
      return Number(n || 0).toLocaleString("he-IL", { maximumFractionDigits: 2 });
    }

    async function loadHishtalmut() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const hisht = data.hishtalmut || {};

      document.getElementById("hishtalmut-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const value = hisht.value || 0;
      const profit = hisht.profit || 0;

      document.getElementById("hishtalmut-value").innerText = "₪" + fmt(value);
      document.getElementById("hishtalmut-profit").innerText =
        (profit >= 0 ? "+" : "") + "₪" + fmt(profit);
      document.getElementById("hishtalmut-notes").innerText =
        hisht.notes || "—";

      const tbody = document.getElementById("hishtalmut-table-body");
      tbody.innerHTML = `
        <tr>
          <td>קרן השתלמות</td>
          <td>₪${fmt(value)}</td>
          <td class="${profit >= 0 ? 'value-positive' : 'value-negative'}">
            ${(profit >= 0 ? '+' : '')}₪${fmt(profit)}
          </td>
          <td>${new Date().toLocaleDateString("he-IL")}</td>
        </tr>
      `;
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadHishtalmut();
  </script>

</body>
</html>
