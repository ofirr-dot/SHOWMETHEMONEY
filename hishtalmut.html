<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>קרן השתלמות – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="top-nav">
    <a href="index.html" class="nav-item">סקירה כללית</a>
    <a href="ibkr.html" class="nav-item">IBKR</a>
    <a href="fair.html" class="nav-item">FAIR</a>
    <a href="banks.html" class="nav-item">בנקים</a>
    <a href="hishtalmut.html" class="nav-item active">קרן השתלמות</a>
    <a href="kids.html" class="nav-item">חיסכון לכל ילד</a>
  </nav>

  <div class="page">

    <!-- כותרת -->
    <div class="page-header">
      <div>
        <h1>קרן השתלמות</h1>
        <div class="page-subtitle" id="hishtalmut-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- כרטיסי סיכום -->
    <div class="cards-row">

      <div class="card">
        <div class="card-title">סה״כ שווי</div>
        <div class="card-main" id="hishtalmut-total-value">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">סה״כ רווח</div>
        <div class="card-main card-positive" id="hishtalmut-total-pl">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">תשואה ממוצעת</div>
        <div class="card-main" id="hishtalmut-total-yield">0%</div>
      </div>

    </div>

    <!-- טבלה -->
    <div class="table-wrapper">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h2 style="font-size:16px;margin:0;">רשימת הקרנות</h2>
        <span class="table-caption">נתוני קרן השתלמות כפי שמופיעים במערכת</span>
      </div>

      <table>
        <thead>
          <tr>
            <th>שם הקרן</th>
            <th>שווי נוכחי</th>
            <th>רווח/הפסד</th>
            <th>תשואה</th>
            <th>תאריך עדכון</th>
          </tr>
        </thead>

        <tbody id="hishtalmut-table-body">
          <tr><td colspan="5">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

  </div>

  <script>
    // נתוני דמו עד שיהיה API אמיתי
    const demoHishtalmut = [
      {
        name: "אלטשולר שחם – סיכון מוגבר",
        value: 6715,
        pl: 3576,
        yield: 46.7,
        date: "01/01/1970"
      },
      {
        name: "הלמן אלדובי – סיכון מוגבר",
        value: 10995,
        pl: 5675,
        yield: 48.4,
        date: "01/01/1970"
      },
      {
        name: "הראל – סיכון מוגבר",
        value: 11640,
        pl: 5870,
        yield: 49.6,
        date: "01/01/1970"
      }
    ];

    function format(n) {
      return Number(n).toLocaleString("he-IL");
    }

    function loadHishtalmut() {
      document.getElementById("hishtalmut-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const tbody = document.getElementById("hishtalmut-table-body");
      tbody.innerHTML = "";

      let totalValue = 0;
      let totalPL = 0;

      demoHishtalmut.forEach(f => {
        totalValue += f.value;
        totalPL += f.pl;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${f.name}</td>
          <td>₪${format(f.value)}</td>
          <td class="${f.pl >= 0 ? 'value-positive' : 'value-negative'}">
            ${f.pl >= 0 ? '+' : ''}₪${format(f.pl)}
          </td>
          <td>${f.yield}%</td>
          <td>${f.date}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById("hishtalmut-total-value").innerText =
        "₪" + format(totalValue);

      document.getElementById("hishtalmut-total-pl").innerText =
        "₪" + format(totalPL);

      document.getElementById("hishtalmut-total-yield").innerText =
        ((totalPL / (totalValue - totalPL)) * 100).toFixed(2) + "%";
    }

    loadHishtalmut();
  </script>

</body>
</html>
