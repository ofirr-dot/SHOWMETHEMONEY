<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>קרן השתלמות – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    table th, table td {
      text-align: center;
    }

    .bubble-row {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    .bubble {
      flex: 1;
      background: var(--card-bg);
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 90px;
    }
  </style>
</head>

<body class="theme-hishtalmut">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- 🔥 סרגל ניווט חדש בלבד — שום דבר אחר לא השתנה -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item active"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
    <a href="admin.html" class="nav-item"><span class="icon">⚙️</span> ניהול נתונים</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>קרן השתלמות</h1>
        <div class="page-subtitle" id="hishtalmut-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- שלוש בועות ממורכזות -->
    <div class="bubble-row">
      <div class="bubble" id="bubble-value">שווי נוכחי: ₪0</div>
      <div class="bubble" id="bubble-pl">רווח/הפסד: ₪0</div>
      <div class="bubble" id="bubble-yield">תשואה: 0%</div>
    </div>

    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px;">פרטי הקרן</h2>

      <table>
        <thead>
          <tr>
            <th>שם הקרן</th>
            <th>שווי נוכחי (₪)</th>
            <th>רווח/הפסד (₪)</th>
            <th>תשואה</th>
          </tr>
        </thead>

        <tbody id="hishtalmut-table-body">
          <tr><td colspan="4">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

    <!-- גרף עוגה -->
    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; font-size:15px;">התפלגות</h3>
        <canvas id="hishtalmut-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", {
        maximumFractionDigits: 2
      });
    }

    async function loadHishtalmut() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const h = data.hishtalmut || {};

      document.getElementById("hishtalmut-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const value = Number(h.value || 0);
      const pl = Number(h.profit || 0);
      const yieldPct =
        value > 0 ? (pl / (value - pl)) * 100 : 0;

      document.getElementById("bubble-value").innerText =
        "שווי נוכחי: ₪" + format(value);

      document.getElementById("bubble-pl").innerText =
        "רווח/הפסד: " + (pl >= 0 ? "+" : "") + "₪" + format(pl);

      document.getElementById("bubble-yield").innerText =
        "תשואה: " + yieldPct.toFixed(2) + "%";

      const tbody = document.getElementById("hishtalmut-table-body");
      tbody.innerHTML = `
        <tr>
          <td>${h.name || "—"}</td>
          <td>₪${format(value)}</td>
          <td class="${pl >= 0 ? 'value-positive' : 'value-negative'}">
            ${pl >= 0 ? '+' : ''}₪${format(pl)}
          </td>
          <td>${yieldPct.toFixed(2)}%</td>
        </tr>
      `;

      const ctx = document.getElementById("hishtalmut-chart");
      if (ctx) {
        new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: ["שווי נוכחי", "רווח"],
            datasets: [{
              data: [value - pl, pl],
              backgroundColor: ["#6A4FF7", "#0A8A2A"]
            }]
          },
          options: {
            plugins: { legend: { position: "bottom" } }
          }
        });
      }
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadHishtalmut();
  </script>

</body>
</html>
