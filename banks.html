<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>בנקים – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    th.sortable { cursor: pointer; text-align:center; }
    th.sortable:hover { opacity: 0.7; }
    td { text-align:center; }

    .bubble-row {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    .bubble {
      flex: 1;
      background: var(--card-bg);
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 90px;
    }

    .refresh-btn {
      background: #4A90E2;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      font-size: 14px;
    }

    .refresh-btn:hover {
      background: #357ABD;
    }
  </style>
</head>

<body class="theme-banks">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item active"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
  </nav>

  <div class="page">

    <!-- שלוש בועות ממורכזות -->
    <div class="bubble-row">
      <div class="bubble" id="bubble-total-ils">שווי כולל: ₪0</div>
      <div class="bubble" id="bubble-accounts">חשבונות: 0</div>
      <div class="bubble" id="bubble-usd">
        USD: —  
        <br>
        <button class="refresh-btn" onclick="refreshUsd()">רענן</button>
      </div>
    </div>

    <div class="page-header">
      <div>
        <h1>בנקים</h1>
        <div class="page-subtitle" id="banks-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- טבלה -->
    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px;">רשימת חשבונות בנק</h2>

      <table>
        <thead>
          <tr>
            <th class="sortable" data-col="bank">בנק ⬍</th>
            <th class="sortable" data-col="type">סוג חשבון ⬍</th>
            <th class="sortable" data-col="usd">שווי ($) ⬍</th>
            <th class="sortable" data-col="ils">שווי נוכחי (₪) ⬍</th>
          </tr>
        </thead>

        <tbody id="banks-table-body">
          <tr><td colspan="4">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

    <!-- גרף עוגה -->
    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; font-size:15px;">התפלגות לפי בנק</h3>
        <canvas id="banks-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    let rows = [];
    let sortState = {};
    let usdRate = 0;

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", {
        maximumFractionDigits: 2
      });
    }

    async function loadBanks() {
      const res = await fetch(API_URL);
      const data = await res.json();

      usdRate = data.ibkr?.summary?.usdRate || 3.6;

      rows = (data.banks || [])
        .map(b => {
          const ils = Number(b.valueIls || b["ערך בש״ח"] || 0);

          const isUsd =
            (b.currency || "").toUpperCase() === "USD" ||
            (b.type || "").toLowerCase().includes("checking") ||
            (b.type || "").toLowerCase().includes("savings");

          const usd = isUsd ? ils / usdRate : null;

          return {
            bank: b.bank || b["בנק"],
            type: b.type || b["סוג חשבון"],
            usd,
            ils
          };
        })
        .filter(r => r.ils > 0);

      const now = new Date().toLocaleString("he-IL");

      document.getElementById("banks-timestamp").innerText = now;

      const totalIls = rows.reduce((s, r) => s + r.ils, 0);

      document.getElementById("bubble-total-ils").innerText =
        "שווי כולל: ₪" + format(totalIls);

      document.getElementById("bubble-accounts").innerText =
        "חשבונות: " + rows.length;

      document.getElementById("bubble-usd").innerHTML =
        `USD: ${usdRate}<br><small>${now}</small><br>
         <button class="refresh-btn" onclick="refreshUsd()">רענן</button>`;

      renderTable();
      enableSorting();
      renderChart();
    }

    function refreshUsd() {
      loadBanks();
    }

    function renderTable() {
      const tbody = document.getElementById("banks-table-body");
      tbody.innerHTML = "";

      rows.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.bank}</td>
          <td>${r.type}</td>
          <td>${r.usd ? "$" + format(r.usd) : "—"}</td>
          <td>₪${format(r.ils)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function enableSorting() {
      document.querySelectorAll("th.sortable").forEach(th => {
        th.addEventListener("click", () => {
          const col = th.dataset.col;

          sortState[col] = !sortState[col];

          rows.sort((a, b) => {
            const A = a[col] ?? 0;
            const B = b[col] ?? 0;

            if (typeof A === "string") {
              return sortState[col] ? A.localeCompare(B) : B.localeCompare(A);
            }

            return sortState[col] ? A - B : B - A;
          });

          document.querySelectorAll("th.sortable").forEach(x => {
            x.innerHTML = x.innerHTML.replace("⬆", "⬍").replace("⬇", "⬍");
          });

          th.innerHTML = th.innerHTML.replace("⬍", sortState[col] ? "⬆" : "⬇");

          renderTable();
        });
      });
    }

    function renderChart() {
      const ctx = document.getElementById("banks-chart");
      new Chart(ctx, {
        type: "pie",
        data: {
          labels: rows.map(r => r.bank),
          datasets: [{
            data: rows.map(r => r.ils),
            backgroundColor: [
              "#6A4FF7", "#0A8A2A", "#00A8A8",
              "#FF8A3D", "#E84E89", "#4A90E2"
            ]
          }]
        },
        options: {
          plugins: { legend: { position: "bottom" } }
        }
      });
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadBanks();
  </script>

</body>
</html>
