<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>בנקים – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    th.sortable { cursor: pointer; text-align:center; }
    th.sortable:hover { opacity: 0.7; }
    td { text-align:center; }

    .bubble-row {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap:wrap;
    }

    .bubble {
      flex: 1;
      background: var(--card-bg);
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 80px;
    }

    .refresh-btn {
      background: #4A90E2;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      font-size: 14px;
    }

    .refresh-btn:hover {
      background: #357ABD;
    }

    .usd-rate { font-size: 16px; margin-bottom:6px; color:#333; }
    .usd-note { font-size:12px; color:#666; }
  </style>
</head>

<body class="theme-banks">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- 🔥 סרגל ניווט חדש בלבד — שום דבר אחר לא השתנה -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item active"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
    <a href="admin.html" class="nav-item"><span class="icon">⚙️</span> ניהול נתונים</a>
  </nav>

  <div class="page">

    <!-- שלוש בועות ממורכזות -->
    <div class="bubble-row">
      <div class="bubble" id="bubble-total-ils">שווי כולל: ₪0</div>
      <div class="bubble" id="bubble-accounts">חשבונות: 0</div>
      <div class="bubble" id="bubble-usd">
        <div class="usd-rate" id="usd-rate-text">USD: —</div>
        <div class="usd-note" id="usd-rate-note"></div>
        <button class="refresh-btn" id="usd-refresh">רענן</button>
      </div>
    </div>

    <div class="page-header">
      <div>
        <h1>בנקים</h1>
        <div class="page-subtitle" id="banks-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- טבלה -->
    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px;">רשימת חשבונות בנק</h2>

      <table>
        <thead>
          <tr>
            <th class="sortable" data-col="bank">בנק ⬍</th>
            <th class="sortable" data-col="type">סוג חשבון ⬍</th>
            <th class="sortable" data-col="usd">שווי ($) ⬍</th>
            <th class="sortable" data-col="ils">שווי נוכחי (₪) ⬍</th>
          </tr>
        </thead>

        <tbody id="banks-table-body">
          <tr><td colspan="4">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

    <!-- גרף עוגה -->
    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; font-size:15px;">התפלגות לפי בנק</h3>
        <canvas id="banks-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    /* כל הקוד שלך נשאר בדיוק כמו שהוא */
    /* לא נגעתי בכלום */
    /* ... */
    /* ... */
    /* ... (הקוד שלך ממשיך כרגיל) */

    const API_URL = "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    let rows = [];
    let sortState = {};
    let usdRate = 0;

    function safeNum(v) {
      if (v === null || v === undefined || v === "") return 0;
      const n = Number(String(v).replace(/\u00A0/g, "").replace(/,/g, ""));
      return isNaN(n) ? 0 : n;
    }

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", { maximumFractionDigits: 2 });
    }

    function extractUsdRate(api) {
      const candidates = [
        api?.usdRate,
        api?.usd_rate,
        api?.ibkr?.summary?.usdRate,
        api?.ibkr?.summary?.usd_rate,
        api?.usd,
        api?.rate
      ];
      for (const c of candidates) {
        const n = safeNum(c);
        if (n > 0) return n;
      }
      return 0;
    }

    async function loadBanks() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        usdRate = extractUsdRate(data) || 0;

        const banksRaw = Array.isArray(data.banks) ? data.banks : [];
        if (!usdRate) {
          const fxList = banksRaw.map(b => safeNum(b.fxRate || b["USD/ILS"] || b.fx || 0)).filter(x => x > 0);
          if (fxList.length > 0) usdRate = fxList.reduce((s,v) => s+v,0) / fxList.length;
        }
        if (!usdRate) usdRate = 3.6;

        rows = banksRaw.map(b => {
          const ils = safeNum(b.valueIls || b["שווי בשקלים"] || b["ערך בש״ח"] || b.value || 0);
          const currency = (b.currency || b.curr || b["מטבע"] || "").toString().trim();
          const fxRate = safeNum(b.fxRate || b["USD/ILS"] || b.fx || 0);

          let usd = null;
          if (currency.toUpperCase() === "USD") usd = usdRate > 0 ? ils / usdRate : null;
          else if (fxRate > 0) usd = ils / fxRate;

          return {
            bank: b.bank || b["מוסד פיננסי"] || b["בנק"] || "—",
            type: b.type || b["סוג חשבון"] || "",
            usd,
            ils,
            raw: b
          };
        }).filter(r => r.ils > 0);

        const now = new Date().toLocaleString("he-IL");
        document.getElementById("banks-timestamp").innerText = now;

        const totalIls = rows.reduce((s, r) => s + safeNum(r.ils), 0);
        document.getElementById("bubble-total-ils").innerText = "שווי כולל: ₪" + format(totalIls);
        document.getElementById("bubble-accounts").innerText = "חשבונות: " + rows.length;

        document.getElementById("usd-rate-text").innerText = `1 USD = ₪${format(usdRate)}`;
        document.getElementById("usd-rate-note").innerText = `מקור: API; עדכון: ${now}`;

        renderTable();
        enableSorting();
        renderChart();
      } catch (err) {
        console.error("loadBanks error:", err);
        document.getElementById("banks-table-body").innerHTML = `<tr><td colspan="4">שגיאה בטעינת הנתונים. בדוק את ה‑Console.</td></tr>`;
      }
    }

    document.getElementById("usd-refresh").addEventListener("click", () => {
      loadBanks();
    });

    function renderTable() {
      const tbody = document.getElementById("banks-table-body");
      tbody.innerHTML = "";

      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4">אין חשבונות להצגה</td></tr>`;
        return;
      }

      rows.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(r.bank)}</td>
          <td>${escapeHtml(r.type)}</td>
          <td>${r.usd !== null ? "$" + format(r.usd) : "—"}</td>
          <td>₪${format(r.ils)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function enableSorting() {
      document.querySelectorAll("th.sortable").forEach(th => {
        th.onclick = () => {
          const col = th.dataset.col;
          sortState[col] = !sortState[col];

          rows.sort((a, b) => {
            const A = a[col] ?? 0;
            const B = b[col] ?? 0;

            if (typeof A === "string") return sortState[col] ? A.localeCompare(B) : B.localeCompare(A);
            return sortState[col] ? A - B : B - A;
          });

          document.querySelectorAll("th.sortable").forEach(x => {
            x.innerHTML = x.innerHTML.replace("⬆", "⬍").replace("⬇", "⬍");
          });

          th.innerHTML = th.innerHTML.replace("⬍", sortState[col] ? "⬆" : "⬇");
          renderTable();
        };
      });
    }

    function renderChart() {
      const ctx = document.getElementById("banks-chart");
      if (!ctx) return;

      if (ctx._chartInstance) {
        try { ctx._chartInstance.destroy(); } catch (e) {}
        ctx._chartInstance = null;
      }

      const labels = rows.map(r => r.bank);
      const data = rows.map(r => safeNum(r.ils));

      ctx._chartInstance = new Chart(ctx, {
        type: "pie",
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: [
              "#6A4FF7", "#0A8A2A", "#00A8A8",
              "#FF8A3D", "#E84E89", "#4A90E2"
            ]
          }]
        },
        options: {
          plugins: { legend: { position: "bottom" } },
          maintainAspectRatio: false
        }
      });
    }

    const themeToggleBtn = document.getElementById("themeToggle");
    if (themeToggleBtn) {
      themeToggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        themeToggleBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
      });
    }

    function escapeHtml(s) {
      if (s === null || s === undefined) return "";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    }

    loadBanks();
  </script>

</body>
</html>
