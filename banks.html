<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>בנקים – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-banks">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item active"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>בנקים</h1>
        <div class="page-subtitle" id="banks-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">

      <div class="card">
        <div class="card-title">שווי כולל</div>
        <div class="card-main" id="banks-total-value">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">מספר חשבונות</div>
        <div class="card-main" id="banks-total-accounts">0</div>
      </div>

    </div>

    <!-- גרף עוגה קטן -->
    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; font-size:15px;">התפלגות לפי בנק</h3>
        <canvas id="banks-chart" height="80"></canvas>
      </div>
    </div>

    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px;">רשימת חשבונות בנק</h2>

      <table>
        <thead>
          <tr>
            <th>בנק</th>
            <th>סוג חשבון</th>
            <th>שווי נוכחי (₪)</th>
          </tr>
        </thead>

        <tbody id="banks-table-body">
          <tr><td colspan="3">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", {
        maximumFractionDigits: 2
      });
    }

    async function loadBanks() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const banks = data.banks || [];

      document.getElementById("banks-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const totalValue = banks.reduce(
        (s, r) => s + Number(r["ערך בש״ח"] || r.valueIls || 0),
        0
      );

      document.getElementById("banks-total-value").innerText =
        "₪" + format(totalValue);

      document.getElementById("banks-total-accounts").innerText =
        banks.length;

      const tbody = document.getElementById("banks-table-body");
      tbody.innerHTML = "";

      banks.forEach(b => {
        const value = Number(b["ערך בש״ח"] || b.valueIls || 0);

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${b["בנק"] || b.bank || "—"}</td>
          <td>${b["סוג חשבון"] || b.type || "—"}</td>
          <td>₪${format(value)}</td>
        `;
        tbody.appendChild(tr);
      });

      const ctx = document.getElementById("banks-chart");
      if (ctx) {
        new Chart(ctx, {
          type: "pie",
          data: {
            labels: banks.map(b => b["בנק"] || b.bank || "—"),
            datasets: [{
              data: banks.map(b => Number(b["ערך בש״ח"] || b.valueIls || 0)),
              backgroundColor: [
                "#6A4FF7", "#0A8A2A", "#00A8A8",
                "#FF8A3D", "#E84E89", "#4A90E2"
              ]
            }]
          },
          options: {
            plugins: { legend: { position: "bottom" } }
          }
        });
      }
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadBanks();
  </script>

</body>
</html>
