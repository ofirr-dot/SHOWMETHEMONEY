<!DOCTYPE html>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --card-bg: #fff;
      --page-bg: #f5f7fb;
      --text: #222;
      --accent: #007AFF;
    }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--page-bg); color:var(--text); direction:rtl; }
    nav.top-nav { display:flex; gap:8px; padding:12px; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.06); align-items:center; }
    .page { max-width:1100px; margin:20px auto; padding:16px; box-sizing:border-box; }

    table { width:100%; border-collapse:collapse; }
    table th, table td { text-align:center; padding:10px; border-bottom:1px solid #eee; }
    .bubble-row { display:flex; gap:15px; margin-bottom:18px; flex-wrap:wrap; }
    .bubble { flex:1; background:var(--card-bg); padding:16px; border-radius:12px; text-align:center; font-size:16px; font-weight:700; box-shadow:0 2px 6px rgba(0,0,0,0.12); min-height:72px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    .table-wrapper { overflow-x:auto; background:transparent; padding:8px 0; }
    .value-positive { color:#0a8a2a; font-weight:600; }
    .value-negative { color:#e84e89; font-weight:600; }
    .cards-row { margin-top:20px; display:flex; justify-content:center; }
    .card { background:var(--card-bg); border-radius:12px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,0.06); width:100%; max-width:640px; box-sizing:border-box; }

    .chart-container { width:100%; max-height:320px; height:320px; position:relative; }
    canvas { width:100% !important; height:100% !important; display:block; }

    #themeToggle {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    body.dark { background:#0f1720; color:#e6eef8; }
    body.dark .card, body.dark .bubble, body.dark nav.top-nav { background:#0b1220; color:#e6eef8; box-shadow:none; border:1px solid rgba(255,255,255,0.03); }
    body.dark #themeToggle { background:#0b1220; color:#fff; border:1px solid rgba(255,255,255,0.06); }

    @media (max-width:640px) {
      .bubble { font-size:14px; min-height:64px; }
      table th, table td { font-size:13px; padding:8px; }
      .chart-container { height:260px; max-height:260px; }
      #themeToggle { width:40px; height:40px; left:10px; top:10px; }
    }
  </style>
</head>
