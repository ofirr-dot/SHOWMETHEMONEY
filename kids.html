<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>חיסכון לכל ילד – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-kids">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- סרגל ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item active"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
    <a href="admin.html" class="nav-item"><span class="icon">⚙️</span> ניהול נתונים</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>חיסכון לכל ילד</h1>
        <div class="page-subtitle" id="kids-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">
      <div class="card">
        <div class="card-title">שווי כולל (₪)</div>
        <div class="card-main" id="kids-total">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח/הפסד (₪)</div>
        <div class="card-main" id="kids-profit">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">מספר חשבונות</div>
        <div class="card-main" id="kids-count">0</div>
      </div>
    </div>

    <div class="table-wrapper">
      <h3 style="margin-bottom:10px;">רשימת חשבונות חיסכון</h3>

      <table>
        <thead>
          <tr>
            <th>שם הילד</th>
            <th>שווי נוכחי (₪)</th>
            <th>הפקדות (₪)</th>
            <th>רווח (₪)</th>
          </tr>
        </thead>

        <tbody id="kids-table-body">
          <tr><td colspan="4">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; text-align:center;">התפלגות לפי ילד</h3>
        <canvas id="kids-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function fmt(n) {
      return Number(n || 0).toLocaleString("he-IL", { maximumFractionDigits: 2 });
    }

    async function loadKids() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const kids = data.kids || [];

      document.getElementById("kids-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const total = kids.reduce((s, r) => s + Number(r.value || 0), 0);
      const deposits = kids.reduce((s, r) => s + Number(r.deposits || 0), 0);
      const profit = total - deposits;

      document.getElementById("kids-total").innerText = "₪" + fmt(total);
      document.getElementById("kids-profit").innerText =
        (profit >= 0 ? "+" : "") + "₪" + fmt(profit);
      document.getElementById("kids-count").innerText = kids.length;

      const tbody = document.getElementById("kids-table-body");
      tbody.innerHTML = "";

      kids.forEach(k => {
        const p = Number(k.value || 0) - Number(k.deposits || 0);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${k.name || "—"}</td>
          <td>₪${fmt(k.value)}</td>
          <td>₪${fmt(k.deposits)}</td>
          <td class="${p >= 0 ? 'value-positive' : 'value-negative'}">
            ${(p >= 0 ? '+' : '')}₪${fmt(p)}
          </td>
        `;
        tbody.appendChild(tr);
      });

      new Chart(document.getElementById("kids-chart"), {
        type: "pie",
        data: {
          labels: kids.map(k => k.name),
          datasets: [{
            data: kids.map(k => k.value),
            backgroundColor: ["#6A4FF7", "#0A8A2A", "#00A8A8", "#FF8A3D", "#E84E89"]
          }]
        }
      });
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadKids();
  </script>

</body>
</html>
