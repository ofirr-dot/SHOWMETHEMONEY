<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>חיסכון לכל ילד – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-kids">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item active"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>חיסכון לכל ילד</h1>
        <div class="page-subtitle" id="kids-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- כרטיסים -->
    <div class="cards-row">

      <div class="card">
        <div class="card-title">שווי כולל</div>
        <div class="card-main" id="kids-total-value">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח כולל</div>
        <div class="card-main card-positive" id="kids-total-pl">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">מספר ילדים</div>
        <div class="card-main" id="kids-count">0</div>
      </div>

    </div>

    <!-- טבלה -->
    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px;">רשימת ילדים</h2>

      <table>
        <thead>
          <tr>
            <th>שם</th>
            <th>שווי נוכחי (₪)</th>
            <th>הפקדות מצטברות (₪)</th>
            <th>רווח/הפסד (₪)</th>
            <th>תשואה</th>
          </tr>
        </thead>

        <tbody id="kids-table-body">
          <tr><td colspan="5">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

    <!-- גרף עוגה קטן בתחתית -->
    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; font-size:15px;">התפלגות לפי ילד</h3>
        <canvas id="kids-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", {
        maximumFractionDigits: 2
      });
    }

    async function loadKids() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const kids = data.kids || [];

      document.getElementById("kids-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const totalValue = kids.reduce(
        (s, r) => s + Number(r.valueIls || r.value || 0),
        0
      );

      const totalProfit = kids.reduce(
        (s, r) => s + Number(r.profitIls || r.profit || 0),
        0
      );

      document.getElementById("kids-total-value").innerText =
        "₪" + format(totalValue);

      document.getElementById("kids-total-pl").innerText =
        (totalProfit >= 0 ? "+" : "") + "₪" + format(totalProfit);

      document.getElementById("kids-count").innerText = kids.length;

      const tbody = document.getElementById("kids-table-body");
      tbody.innerHTML = "";

      kids.forEach(k => {
        const value = Number(k.valueIls || k.value || 0);
        const deposits = Number(k.deposits || 0);
        const pl = Number(k.profitIls || k.profit || 0);
        const yieldPct =
          deposits > 0 ? ((pl / deposits) * 100).toFixed(2) : "0.00";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${k.name}</td>
          <td>₪${format(value)}</td>
          <td>₪${format(deposits)}</td>
          <td class="${pl >= 0 ? 'value-positive' : 'value-negative'}">
            ${pl >= 0 ? '+' : ''}₪${format(pl)}
          </td>
          <td>${yieldPct}%</td>
        `;
        tbody.appendChild(tr);
      });

      const ctx = document.getElementById("kids-chart");
      if (ctx) {
        new Chart(ctx, {
          type: "pie",
          data: {
            labels: kids.map(k => k.name),
            datasets: [{
              data: kids.map(k => Number(k.valueIls || k.value || 0)),
              backgroundColor: [
                "#6A4FF7", "#0A8A2A", "#00A8A8",
                "#FF8A3D", "#E84E89", "#4A90E2"
              ]
            }]
          },
          options: {
            plugins: { legend: { position: "bottom" } }
          }
        });
      }
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadKids();
  </script>

</body>
</html>
