<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>רווח ממומש – Show Me The Money</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <script src="/loadHeader.js" defer></script>

  <style>
    .page { max-width:1100px; margin:20px auto; padding:16px; box-sizing:border-box; }
    .table-wrapper { background:#fff; padding:14px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; margin-top:8px; }
    th, td { padding:10px; text-align:center; border-bottom:1px solid #eee; }
    .theme-btn { position:fixed; left:12px; top:12px; z-index:9999; width:44px; height:44px; border-radius:10px; border:1px solid rgba(0,0,0,0.06); background:#fff; cursor:pointer; }
  </style>
</head>
<body>

  <button id="themeToggle" class="theme-btn" aria-label="החלפת מצב אור/לילה">🌙</button>

  <div id="site-header"></div>

  <div class="page">
    <div class="page-header" style="margin-bottom:12px;">
      <h1>רווח ממומש</h1>
      <div class="small">רשימת עסקאות מכירה ורווחים</div>
    </div>

    <div class="table-wrapper">
      <table id="realized-table">
        <thead>
          <tr>
            <th>תאריך</th>
            <th>סימול</th>
            <th>תיאור</th>
            <th>עלות (₪)</th>
            <th>מכירה (₪)</th>
            <th>רווח (₪)</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function safeNum(v){ if(v===null||v===undefined||v==="") return 0; const n=Number(String(v).replace(/\u00A0/g,"").replace(/,/g,"")); return isNaN(n)?0:n; }
    function fmt(n){ return Number(n||0).toLocaleString("he-IL",{maximumFractionDigits:2}); }

    async function loadRealized() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const list = Array.isArray(data.realized) ? data.realized : [];
        const tbody = document.querySelector("#realized-table tbody");
        tbody.innerHTML = "";

        if (list.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6">אין נתונים להצגה</td></tr>`;
          return;
        }

        list.forEach(r => {
          const date = r.saleDate || r.date || "";
          const symbol = r.symbol || r.ticker || "";
          const desc = r.description || "";
          const cost = safeNum(r.costIls || r.costUsd || r.cost || 0);
          const proceeds = safeNum(r.proceedsIls || r.proceedsUsd || r.proceeds || 0);
          const profit = safeNum(r.profitIls || r.profit || r.profitUsd || 0);
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${escapeHtml(date)}</td><td>${escapeHtml(symbol)}</td><td>${escapeHtml(desc)}</td><td>₪${fmt(cost)}</td><td>₪${fmt(proceeds)}</td><td class="${profit>=0?'value-positive':'value-negative'}">${profit>=0?'+':''}₪${fmt(profit)}</td>`;
          tbody.appendChild(tr);
        });

      } catch (err) {
        console.error("loadRealized error:", err);
        document.querySelector("#realized-table tbody").innerHTML = `<tr><td colspan="6">שגיאה בטעינת הנתונים. בדוק את ה‑Console.</td></tr>`;
      }
    }

    // כפתור אור/לילה
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        themeToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
      });
    }

    function escapeHtml(s){ if(s===null||s===undefined) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

    document.addEventListener("DOMContentLoaded", () => {
      loadRealized();
    });
  </script>
</body>
</html>
