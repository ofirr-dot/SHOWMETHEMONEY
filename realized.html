<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>רווח ממומש – Show Me The Money</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-realized">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item active"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>💰 רווח ממומש</h1>
        <div class="page-subtitle">כל המכירות שבוצעו + רווחים בדולר ובשקל</div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="realized-table-wrapper">
      <table id="realized-table">
        <thead>
          <tr>
            <th data-col="symbol" class="sortable">סימבול ⬍</th>
            <th data-col="description" class="sortable">תיאור ⬍</th>
            <th data-col="saleDate" class="sortable">תאריך מכירה ⬍</th>
            <th data-col="costUsd" class="sortable">עלות קנייה ($) ⬍</th>
            <th data-col="proceedsUsd" class="sortable">תמורה ($) ⬍</th>
            <th data-col="profitUsd" class="sortable">רווח ($) ⬍</th>
            <th data-col="fxRate" class="sortable">שער ⬍</th>
            <th data-col="profitIls" class="sortable">רווח (₪) ⬍</th>
          </tr>
        </thead>

        <tbody></tbody>

        <tfoot>
          <tr id="realized-summary-row">
            <td colspan="8" style="text-align:center; font-weight:bold; padding:15px;">
              טוען סיכום…
            </td>
          </tr>
        </tfoot>
      </table>
    </div>

  </div>

  <script>
    let rows = [];
    let sortState = {};

    function toNum(v) {
      return Number(v || 0);
    }

    function parseDate(d) {
      const parts = d.split("/");
      return new Date(parts[2], parts[1] - 1, parts[0]);
    }

    async function loadData() {
      const res = await fetch("https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec");
      const data = await res.json();

      rows = (data.realized || [])
        .filter(r => r.symbol && !String(r.year || "").startsWith("💡"))
        .map(r => ({
          symbol: r.symbol,
          description: r.description,
          saleDate: r.saleDate,
          costUsd: toNum(r.costUsd),
          proceedsUsd: toNum(r.proceedsUsd),
          profitUsd: toNum(r.profitUsd),
          fxRate: toNum(r.fxRate),
          profitIls: toNum(r.profitIls)
        }));

      renderTable();
      enableSorting();
    }

    function renderTable() {
      const tbody = document.querySelector("#realized-table tbody");
      const summaryRow = document.getElementById("realized-summary-row");

      tbody.innerHTML = "";

      let totalCost = 0;
      let totalProceeds = 0;
      let totalProfitUsd = 0;
      let totalProfitIls = 0;

      rows.forEach(r => {
        const profitClass = r.profitUsd >= 0 ? "value-positive" : "value-negative";

        totalCost += r.costUsd;
        totalProceeds += r.proceedsUsd;
        totalProfitUsd += r.profitUsd;
        totalProfitIls += r.profitIls;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.symbol}</td>
          <td>${r.description}</td>
          <td>${r.saleDate}</td>
          <td>${r.costUsd.toLocaleString()}</td>
          <td>${r.proceedsUsd.toLocaleString()}</td>
          <td class="${profitClass}">${r.profitUsd.toLocaleString()}</td>
          <td>${r.fxRate}</td>
          <td class="${profitClass}">${r.profitIls.toLocaleString()}</td>
        `;
        tbody.appendChild(tr);
      });

      summaryRow.innerHTML = `
        <td colspan="8" style="text-align:center; font-size:18px; padding:15px;">
          סה״כ עלות: $${totalCost.toLocaleString()} ·
          סה״כ תמורה: $${totalProceeds.toLocaleString()} ·
          סה״כ רווח: $${totalProfitUsd.toLocaleString()} ·
          סה״כ רווח (₪): ₪${totalProfitIls.toLocaleString()}
        </td>
      `;
    }

    function enableSorting() {
      document.querySelectorAll(".sortable").forEach(th => {
        th.addEventListener("click", () => {
          const col = th.dataset.col;

          sortState[col] = !sortState[col];

          rows.sort((a, b) => {
            let A = a[col];
            let B = b[col];

            if (col === "saleDate") {
              A = parseDate(A);
              B = parseDate(B);
            }

            if (typeof A === "string") {
              return sortState[col] ? A.localeCompare(B) : B.localeCompare(A);
            }

            return sortState[col] ? A - B : B - A;
          });

          document.querySelectorAll(".sortable").forEach(x => {
            x.innerHTML = x.innerHTML.replace("⬆", "⬍").replace("⬇", "⬍");
          });

          th.innerHTML = th.innerHTML.replace("⬍", sortState[col] ? "⬆" : "⬇");

          renderTable();
        });
      });
    }

    // מצב כהה/בהיר
    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadData();
  </script>

</body>
</html>
