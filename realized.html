<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>רווח ממומש – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-realized">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- סרגל ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item active"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
    <a href="admin.html" class="nav-item"><span class="icon">⚙️</span> ניהול נתונים</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>רווח ממומש</h1>
        <div class="page-subtitle" id="realized-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="table-wrapper">
      <h3 style="margin-bottom:10px;">רשימת עסקאות ממומשות</h3>

      <table>
        <thead>
          <tr>
            <th>תאריך</th>
            <th>סימול</th>
            <th>תיאור</th>
            <th>עלות (₪)</th>
            <th>מכירה (₪)</th>
            <th>רווח (₪)</th>
          </tr>
        </thead>

        <tbody id="realized-table-body">
          <tr><td colspan="6">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function fmt(n) {
      return Number(n || 0).toLocaleString("he-IL", { maximumFractionDigits: 2 });
    }

    async function loadRealized() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const list = data.realized || [];

      document.getElementById("realized-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const tbody = document.getElementById("realized-table-body");
      tbody.innerHTML = "";

      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6">אין נתונים להצגה</td></tr>`;
        return;
      }

      list.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.date || r.saleDate || ""}</td>
          <td>${r.symbol || ""}</td>
          <td>${r.description || ""}</td>
          <td>₪${fmt(r.costIls || r.cost || 0)}</td>
          <td>₪${fmt(r.proceedsIls || r.proceeds || 0)}</td>
          <td class="${(r.profitIls || r.profit || 0) >= 0 ? 'value-positive' : 'value-negative'}">
            ${(r.profitIls || r.profit || 0) >= 0 ? '+' : ''}₪${fmt(r.profitIls || r.profit || 0)}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadRealized();
  </script>

</body>
</html>
