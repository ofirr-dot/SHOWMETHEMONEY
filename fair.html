<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>FAIR – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-fair">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item active"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>FAIR</h1>
        <div class="page-subtitle" id="fair-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">

      <div class="card">
        <div class="card-title">שווי כולל</div>
        <div class="card-main" id="fair-total-value">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח כולל</div>
        <div class="card-main card-positive" id="fair-total-pl">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">תשואה</div>
        <div class="card-main" id="fair-total-yield">0%</div>
      </div>

    </div>

    <div class="cards-row">
      <div class="card" style="padding:25px;">
        <h3 style="margin-bottom:15px;">התפלגות לפי קרן</h3>
        <canvas id="fair-chart" height="120"></canvas>
      </div>
    </div>

    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px;">רשימת קרנות FAIR</h2>

      <table>
        <thead>
          <tr>
            <th>שם הקרן</th>
            <th>שווי נוכחי (₪)</th>
            <th>רווח/הפסד (₪)</th>
            <th>תשואה</th>
          </tr>
        </thead>

        <tbody id="fair-table-body">
          <tr><td colspan="4">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", {
        maximumFractionDigits: 2
      });
    }

    async function loadFAIR() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const fair = data.fair || [];

      document.getElementById("fair-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const totalValue = fair.reduce(
        (s, r) => s + Number(r["שווי נוכחי (₪)"] || r.valueIls || 0),
        0
      );

      const totalProfit = fair.reduce(
        (s, r) => s + Number(r["רווח/הפסד (₪)"] || r.plIls || 0),
        0
      );

      const totalYield =
        totalValue > 0 ? (totalProfit / (totalValue - totalProfit)) * 100 : 0;

      document.getElementById("fair-total-value").innerText =
        "₪" + format(totalValue);

      document.getElementById("fair-total-pl").innerText =
        (totalProfit >= 0 ? "+" : "") + "₪" + format(totalProfit);

      document.getElementById("fair-total-yield").innerText =
        totalYield.toFixed(2) + "%";

      const tbody = document.getElementById("fair-table-body");
      tbody.innerHTML = "";

      fair.forEach(f => {
        const value = Number(f["שווי נוכחי (₪)"] || f.valueIls || 0);
        const pl = Number(f["רווח/הפסד (₪)"] || f.plIls || 0);
        const yieldPct =
          value > 0 ? ((pl / (value - pl)) * 100).toFixed(2) : "0.00";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${f["שם הקרן"] || f.name || "—"}</td>
          <td>₪${format(value)}</td>
          <td class="${pl >= 0 ? 'value-positive' : 'value-negative'}">
            ${pl >= 0 ? '+' : ''}₪${format(pl)}
          </td>
          <td>${yieldPct}%</td>
        `;
        tbody.appendChild(tr);
      });

      const ctx = document.getElementById("fair-chart");
      if (ctx) {
        new Chart(ctx, {
          type: "pie",
          data: {
            labels: fair.map(f => f["שם הקרן"] || f.name || "—"),
            datasets: [{
              data: fair.map(f => Number(f["שווי נוכחי (₪)"] || f.valueIls || 0)),
              backgroundColor: [
                "#6A4FF7", "#0A8A2A", "#00A8A8",
                "#FF8A3D", "#E84E89", "#4A90E2"
              ]
            }]
          },
          options: {
            plugins: { legend: { position: "bottom" } }
          }
        });
      }
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadFAIR();
  </script>

</body>
</html>
