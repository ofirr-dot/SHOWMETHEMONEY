<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>FAIR – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    table th, table td {
      text-align: center;
    }

    .bubble-row {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    .bubble {
      flex: 1;
      background: var(--card-bg);
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 90px;
    }
  </style>
</head>

<body class="theme-fair">

  <button id="themeToggle" class="theme-btn">🌙</button>

  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item active"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>FAIR</h1>
        <div class="page-subtitle" id="fair-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <!-- בועות ממורכזות -->
    <div class="bubble-row">
      <div class="bubble" id="fair-total-value-bubble">שווי כולל: ₪0</div>
      <div class="bubble" id="fair-total-pl-bubble">רווח כולל: ₪0</div>
      <div class="bubble" id="fair-total-yield-bubble">תשואה: 0%</div>
    </div>

    <!-- טבלה -->
    <div class="table-wrapper">
      <h2 style="font-size:16px;margin-bottom:10px; text-align:center;">רשימת קרנות FAIR</h2>

      <table>
        <thead>
          <tr>
            <th>שם הקרן</th>
            <th>שווי נוכחי (₪)</th>
            <th>רווח/הפסד (₪)</th>
            <th>תשואה</th>
          </tr>
        </thead>

        <tbody id="fair-table-body">
          <tr><td colspan="4">טוען נתונים…</td></tr>
        </tbody>

      </table>
    </div>

    <!-- גרף עוגה -->
    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; font-size:15px; text-align:center;">התפלגות לפי קרן</h3>
        <canvas id="fair-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function format(n) {
      return Number(n || 0).toLocaleString("he-IL", {
        maximumFractionDigits: 2
      });
    }

    async function loadFAIR() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const fair = data.fair || [];

      document.getElementById("fair-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const totalValue = fair.reduce(
        (s, r) => s + Number(r["שווי נוכחי (₪)"] || r.valueIls || 0),
        0
      );

      const totalProfit = fair.reduce(
        (s, r) => s + Number(r["רווח/הפסד (₪)"] || r.plIls || 0),
        0
      );

      const totalYield =
        totalValue > 0 ? (totalProfit / (totalValue - totalProfit)) * 100 : 0;

      // בועות
      document.getElementById("fair-total-value-bubble").innerText =
        "שווי כולל: ₪" + format(totalValue);

      document.getElementById("fair-total-pl-bubble").innerText =
        "רווח כולל: " + (totalProfit >= 0 ? "+" : "") + "₪" + format(totalProfit);

      document.getElementById("fair-total-yield-bubble").innerText =
        "תשואה: " + totalYield.toFixed(2) + "%";

      // טבלה
      const tbody = document.getElementById("fair-table-body");
      tbody.innerHTML = "";

      fair.forEach(f => {
        const value = Number(f["שווי נוכחי (₪)"] || f.valueIls || 0);
        const pl = Number(f["רווח/הפסד (₪)"] || f.plIls || 0);
        const yieldPct =
          value > 0 ? ((pl / (value - pl)) * 100).toFixed(2) : "0.00";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${f["שם הקרן"]}</td>
          <td>₪${format(value)}</td>
          <td class="${pl >= 0 ? 'value-positive' : 'value-negative'}">
            ${pl >= 0 ? '+' : ''}₪${format(pl)}
          </td>
          <td>${yieldPct}%</td>
        `;
        tbody.appendChild(tr);
      });

      // גרף
      const ctx = document.getElementById("fair-chart");
      if (ctx) {
        new Chart(ctx, {
          type: "pie",
          data: {
            labels: fair.map(f => f["שם הקרן"]),
            datasets: [{
              data: fair.map(f => Number(f["שווי נוכחי (₪)"])),
              backgroundColor: [
                "#6A4FF7", "#0A8A2A", "#00A8A8",
                "#FF8A3D", "#E84E89", "#4A90E2"
              ]
            }]
          },
          options: {
            plugins: { legend: { position: "bottom" } }
          }
        });
      }
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadFAIR();
  </script>

</body>
</html>
