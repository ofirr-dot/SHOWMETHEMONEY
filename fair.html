<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>FAIR – Show Me The Money</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-fair">

  <!-- מצב כהה/בהיר -->
  <button id="themeToggle" class="theme-btn">🌙</button>

  <!-- סרגל ניווט -->
  <nav class="top-nav">
    <a href="index.html" class="nav-item"><span class="icon">🧭</span> סקירה כללית</a>
    <a href="ibkr.html" class="nav-item"><span class="icon">📈</span> IBKR</a>
    <a href="fair.html" class="nav-item active"><span class="icon">📊</span> FAIR</a>
    <a href="banks.html" class="nav-item"><span class="icon">🏦</span> בנקים</a>
    <a href="realized.html" class="nav-item"><span class="icon">💰</span> רווח ממומש</a>
    <a href="hishtalmut.html" class="nav-item"><span class="icon">🎓</span> קרן השתלמות</a>
    <a href="kids.html" class="nav-item"><span class="icon">👶</span> חיסכון לכל ילד</a>
    <a href="tax.html" class="nav-item"><span class="icon">🧾</span> מס רווחי הון</a>
    <a href="admin.html" class="nav-item"><span class="icon">⚙️</span> ניהול נתונים</a>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>FAIR</h1>
        <div class="page-subtitle" id="fair-timestamp"></div>
      </div>
      <div class="page-subtitle">Ofir</div>
    </div>

    <div class="cards-row">
      <div class="card">
        <div class="card-title">שווי כולל (₪)</div>
        <div class="card-main" id="fair-total">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">רווח/הפסד (₪)</div>
        <div class="card-main" id="fair-profit">₪0</div>
      </div>

      <div class="card">
        <div class="card-title">מספר קרנות</div>
        <div class="card-main" id="fair-count">0</div>
      </div>
    </div>

    <div class="table-wrapper">
      <h3 style="margin-bottom:10px;">רשימת קרנות FAIR</h3>
      <table>
        <thead>
          <tr>
            <th>שם הקרן</th>
            <th>שווי נוכחי (₪)</th>
            <th>רווח/הפסד (₪)</th>
          </tr>
        </thead>
        <tbody id="fair-table-body">
          <tr><td colspan="3">טוען נתונים…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="cards-row">
      <div class="card" style="padding:20px; max-width:350px; margin:auto;">
        <h3 style="margin-bottom:10px; text-align:center;">התפלגות לפי קרן</h3>
        <canvas id="fair-chart" height="80"></canvas>
      </div>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbz9UwCkg64Och-R4FyjLEhNMrXN2qDOyYn98JnT3qdY66lQBRgBIOH5vV_OAThGRDEksw/exec";

    function fmt(n) {
      return Number(n || 0).toLocaleString("he-IL", { maximumFractionDigits: 2 });
    }

    async function loadFair() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const fair = data.fair || [];

      document.getElementById("fair-timestamp").innerText =
        new Date().toLocaleString("he-IL");

      const total = fair.reduce((s, r) => s + Number(r["שווי נוכחי (₪)"] || 0), 0);
      const profit = fair.reduce((s, r) => s + Number(r["רווח/הפסד (₪)"] || 0), 0);

      document.getElementById("fair-total").innerText = "₪" + fmt(total);
      document.getElementById("fair-profit").innerText =
        (profit >= 0 ? "+" : "") + "₪" + fmt(profit);
      document.getElementById("fair-count").innerText = fair.length;

      const tbody = document.getElementById("fair-table-body");
      tbody.innerHTML = "";

      fair.forEach(f => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${f["שם הקרן"]}</td>
          <td>₪${fmt(f["שווי נוכחי (₪)"])}</td>
          <td class="${f["רווח/הפסד (₪)"] >= 0 ? 'value-positive' : 'value-negative'}">
            ${(f["רווח/הפסד (₪)"] >= 0 ? '+' : '')}₪${fmt(f["רווח/הפסד (₪)"])}
          </td>
        `;
        tbody.appendChild(tr);
      });

      new Chart(document.getElementById("fair-chart"), {
        type: "pie",
        data: {
          labels: fair.map(f => f["שם הקרן"]),
          datasets: [{
            data: fair.map(f => f["שווי נוכחי (₪)"]),
            backgroundColor: ["#6A4FF7", "#0A8A2A", "#00A8A8", "#FF8A3D", "#E84E89"]
          }]
        }
      });
    }

    document.getElementById("themeToggle").onclick = () => {
      document.body.classList.toggle("dark");
      themeToggle.textContent =
        document.body.classList.contains("dark") ? "☀️" : "🌙";
    };

    loadFair();
  </script>

</body>
</html>
